<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>両雀 Ryōjaku — 後台中樞</title>
<style>
  :root {
    --bg: #050b14;
    --panel: #0f172a;
    --glass: rgba(15, 23, 42, 0.6);
    --border: rgba(6, 182, 212, 0.15);
    --cyan: #06b6d4;
    --pink: #d946ef;
    --yellow: #facc15;
    --purple: #8b5cf6;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --sans: "Inter", "Roboto", -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
    --mono: "JetBrains Mono", "Fira Code", ui-monospace, SFMono-Regular, Menlo, monospace;
    --header-h: 3.5rem;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { -webkit-text-size-adjust: 100%; }

  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.65;
    min-height: 100vh;
    position: relative;
  }

  /* Cyber grid backdrop, faded top & bottom */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(6, 182, 212, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(6, 182, 212, 0.05) 1px, transparent 1px);
    background-size: 40px 40px;
    -webkit-mask-image: linear-gradient(to bottom, transparent, #000 12%, #000 85%, transparent);
            mask-image: linear-gradient(to bottom, transparent, #000 12%, #000 85%, transparent);
    z-index: 0;
  }

  /* ---------- Header ---------- */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    height: var(--header-h);
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0 1rem;
    background: var(--glass);
    -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  /* Animated scanline running across the top edge */
  .topbar::after {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    height: 2px;
    width: 30%;
    background: linear-gradient(90deg, transparent, var(--cyan), var(--pink), transparent);
    opacity: 0.85;
    animation: scan 6s linear infinite;
    pointer-events: none;
  }
  @keyframes scan {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(340%); }
  }
  @media (prefers-reduced-motion: reduce) {
    .topbar::after { animation: none; opacity: 0.4; width: 100%; }
  }

  .menu-btn {
    display: none;
    flex: none;
    width: 2.25rem;
    height: 2.25rem;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 0.5rem;
    color: var(--cyan);
    font-size: 1.1rem;
    cursor: pointer;
  }
  .menu-btn:hover { box-shadow: 0 0 10px rgba(6, 182, 212, 0.4); }

  .wordmark {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 1.25rem;
    letter-spacing: 0.05em;
    color: var(--text);
    text-shadow: 0 0 14px rgba(6, 182, 212, 0.55);
    white-space: nowrap;
  }
  .wordmark .dot { color: var(--pink); }

  .hub-label {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--cyan);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.15rem 0.6rem;
    background: rgba(6, 182, 212, 0.08);
    white-space: nowrap;
  }

  .tagline {
    color: var(--muted);
    font-size: 0.78rem;
    letter-spacing: 0.06em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
    flex: 1;
  }

  .updated {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted);
    white-space: nowrap;
  }
  .updated b { color: var(--yellow); font-weight: 600; }

  /* ---------- Layout ---------- */
  .layout {
    display: flex;
    position: relative;
    z-index: 1;
    min-height: calc(100vh - var(--header-h));
  }

  /* ---------- Sidebar ---------- */
  .sidebar {
    width: 17.5rem;
    flex: none;
    padding: 1rem 0.85rem 2rem;
    border-right: 1px solid var(--border);
    background: rgba(15, 23, 42, 0.35);
    position: sticky;
    top: var(--header-h);
    height: calc(100vh - var(--header-h));
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(6, 182, 212, 0.3) transparent;
  }
  .sidebar::-webkit-scrollbar { width: 6px; }
  .sidebar::-webkit-scrollbar-thumb { background: rgba(6, 182, 212, 0.25); border-radius: 3px; }

  .search-box { position: relative; margin-bottom: 1rem; }
  .search-box .glyph {
    position: absolute;
    left: 0.7rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 0.8rem;
    pointer-events: none;
  }
  .search-box input {
    width: 100%;
    padding: 0.5rem 0.75rem 0.5rem 2rem;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 0.6rem;
    color: var(--text);
    font-family: var(--sans);
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .search-box input::placeholder { color: var(--muted); }
  .search-box input:focus {
    border-color: rgba(6, 182, 212, 0.5);
    box-shadow: 0 0 10px rgba(6, 182, 212, 0.25);
  }

  .nav-group { margin-bottom: 1.1rem; }
  .nav-group-title {
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0.25rem 0.6rem 0.4rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .nav-group-title::after {
    content: "";
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    width: 100%;
    text-align: left;
    padding: 0.5rem 0.6rem;
    margin: 0.15rem 0;
    background: transparent;
    border: none;
    border-left: 2px solid transparent;
    border-radius: 0.45rem;
    color: var(--text);
    font-family: var(--sans);
    font-size: 0.88rem;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, box-shadow 0.15s, border-color 0.15s;
  }
  .nav-item:hover {
    background: rgba(6, 182, 212, 0.07);
    color: var(--cyan);
  }
  .nav-item.active {
    background: rgba(6, 182, 212, 0.1);
    border-left-color: var(--cyan);
    color: var(--cyan);
    box-shadow: 0 0 10px rgba(6, 182, 212, 0.4);
  }
  .nav-item .icon { flex: none; font-size: 1rem; }
  .nav-item .label {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .badge {
    flex: none;
    font-family: var(--mono);
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.1rem 0.45rem;
    border-radius: 999px;
    border: 1px solid;
  }
  .badge.live {
    color: var(--cyan);
    border-color: rgba(6, 182, 212, 0.4);
    background: rgba(6, 182, 212, 0.1);
  }
  .badge.design {
    color: var(--yellow);
    border-color: rgba(250, 204, 21, 0.35);
    background: rgba(250, 204, 21, 0.08);
  }

  .no-match {
    color: var(--muted);
    font-size: 0.8rem;
    padding: 0.75rem 0.6rem;
    display: none;
  }

  /* ---------- Main pane ---------- */
  .main {
    flex: 1;
    min-width: 0;
    padding: 1.5rem 1.25rem 4rem;
  }

  .doc-shell {
    max-width: 52rem;
    margin: 0 auto;
    background: var(--glass);
    -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 1rem;
    padding: 1.75rem 2rem 2.5rem;
    position: relative;
    overflow: hidden;
  }
  .doc-shell::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--cyan), var(--purple), var(--pink));
    opacity: 0.6;
  }

  .doc-meta {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex-wrap: wrap;
    font-family: var(--mono);
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 1.25rem;
    padding-bottom: 0.9rem;
    border-bottom: 1px solid var(--border);
  }
  .doc-meta .path { color: var(--purple); word-break: break-all; }

  .state-msg {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
  }
  .state-msg .big { font-size: 2.25rem; display: block; margin-bottom: 0.75rem; }
  .state-msg .title { color: var(--text); font-size: 1.05rem; margin-bottom: 0.4rem; }
  .state-msg code {
    font-family: var(--mono);
    font-size: 0.8rem;
    color: var(--pink);
    background: rgba(217, 70, 239, 0.08);
    border: 1px solid rgba(217, 70, 239, 0.25);
    padding: 0.1rem 0.4rem;
    border-radius: 0.3rem;
  }

  /* ---------- Rendered markdown ---------- */
  .md { overflow-wrap: break-word; }

  .md h1, .md h2, .md h3, .md h4, .md h5, .md h6 {
    line-height: 1.35;
    margin: 1.6em 0 0.6em;
    font-weight: 700;
  }
  .md > h1:first-child, .md > h2:first-child { margin-top: 0.2em; }
  .md h1 {
    font-size: 1.65rem;
    color: var(--text);
    text-shadow: 0 0 18px rgba(6, 182, 212, 0.35);
    padding-bottom: 0.4em;
    border-bottom: 1px solid var(--border);
  }
  .md h2 {
    font-size: 1.3rem;
    color: var(--cyan);
    padding-bottom: 0.3em;
    border-bottom: 1px solid rgba(6, 182, 212, 0.12);
  }
  .md h3 { font-size: 1.1rem; color: var(--text); }
  .md h4 { font-size: 0.98rem; color: var(--purple); }
  .md h5, .md h6 {
    font-size: 0.85rem;
    font-family: var(--mono);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .md p { margin: 0.8em 0; }
  .md a { color: var(--cyan); text-decoration: none; border-bottom: 1px dotted rgba(6, 182, 212, 0.5); }
  .md a:hover { text-shadow: 0 0 8px rgba(6, 182, 212, 0.6); border-bottom-style: solid; }
  .md strong { color: var(--text); font-weight: 700; }
  .md em { color: var(--yellow); }
  .md hr {
    border: none;
    height: 1px;
    margin: 2em 0;
    background: linear-gradient(90deg, transparent, var(--border), rgba(6,182,212,0.4), var(--border), transparent);
  }

  .md ul, .md ol { margin: 0.8em 0; padding-left: 1.6em; }
  .md li { margin: 0.3em 0; }
  .md li::marker { color: var(--cyan); }

  .md blockquote {
    margin: 1em 0;
    padding: 0.6em 1em;
    border-left: 3px solid var(--pink);
    background: rgba(217, 70, 239, 0.06);
    border-radius: 0 0.5rem 0.5rem 0;
    color: var(--muted);
  }
  .md blockquote p { margin: 0.3em 0; }

  .md code {
    font-family: var(--mono);
    font-size: 0.84em;
    color: var(--pink);
    background: rgba(217, 70, 239, 0.08);
    border: 1px solid rgba(217, 70, 239, 0.18);
    padding: 0.1em 0.4em;
    border-radius: 0.3rem;
  }
  .md pre {
    margin: 1em 0;
    padding: 1em 1.1em;
    background: rgba(2, 6, 14, 0.75);
    border: 1px solid var(--border);
    border-radius: 0.6rem;
    overflow-x: auto;
    scrollbar-width: thin;
  }
  .md pre code {
    color: var(--text);
    background: none;
    border: none;
    padding: 0;
    font-size: 0.8rem;
    line-height: 1.6;
  }

  .md img { max-width: 100%; border-radius: 0.5rem; border: 1px solid var(--border); }

  /* Tables — rounded container, cyan header, zebra rows */
  .md table {
    display: block;
    width: max-content;
    max-width: 100%;
    overflow-x: auto;
    border-collapse: separate;
    border-spacing: 0;
    margin: 1.2em 0;
    border: 1px solid rgba(148, 163, 184, 0.25);
    border-radius: 0.6rem;
    font-size: 0.86rem;
  }
  .md th, .md td {
    padding: 0.55em 0.9em;
    border-bottom: 1px solid rgba(148, 163, 184, 0.18);
    border-right: 1px solid rgba(148, 163, 184, 0.12);
    text-align: left;
    vertical-align: top;
  }
  .md th:last-child, .md td:last-child { border-right: none; }
  .md tr:last-child td { border-bottom: none; }
  .md thead th {
    background: rgba(6, 182, 212, 0.12);
    color: var(--cyan);
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .md tbody tr:nth-child(even) td { background: rgba(15, 23, 42, 0.55); }
  .md tbody tr:hover td { background: rgba(6, 182, 212, 0.05); }

  /* ---------- Drawer (mobile) ---------- */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(2, 6, 14, 0.65);
    -webkit-backdrop-filter: blur(2px);
            backdrop-filter: blur(2px);
    z-index: 40;
  }

  /* ---------- Embedded page modules (type: "page") ---------- */
  .doc-shell.page-mode {
    max-width: none;
    padding: 0;
  }
  .page-toolbar {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    flex-wrap: wrap;
    padding: 0.6rem 1rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }
  .page-toolbar .pt-icon { flex: none; }
  .page-toolbar .pt-title {
    font-weight: 600;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .page-toolbar .pt-spacer { flex: 1; }
  .page-toolbar a.pt-link {
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    color: var(--cyan);
    text-decoration: none;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.2rem 0.7rem;
    background: rgba(6, 182, 212, 0.06);
    white-space: nowrap;
    transition: box-shadow 0.15s, border-color 0.15s;
  }
  .page-toolbar a.pt-link:hover {
    border-color: rgba(6, 182, 212, 0.5);
    box-shadow: 0 0 10px rgba(6, 182, 212, 0.35);
    text-shadow: none;
  }
  .page-toolbar.in-doc {
    margin: -0.25rem 0 1rem;
    padding: 0 0 0.75rem;
  }
  .page-frame {
    display: block;
    width: 100%;
    height: calc(100vh - var(--header-h) - 8.6rem);
    min-height: 30rem;
    border: none;
    background: var(--bg);
    border-radius: 0 0 1rem 1rem;
  }

  @media (max-width: 52rem) {
    .menu-btn { display: inline-flex; }
    .tagline { display: none; }

    .sidebar {
      position: fixed;
      top: var(--header-h);
      left: 0;
      bottom: 0;
      height: auto;
      width: min(18rem, 85vw);
      background: var(--panel);
      z-index: 45;
      transform: translateX(-105%);
      transition: transform 0.22s ease;
      box-shadow: 8px 0 30px rgba(0, 0, 0, 0.5);
    }
    body.drawer-open .sidebar { transform: translateX(0); }
    body.drawer-open .overlay { display: block; }

    .main { padding: 1rem 0.75rem 3rem; }
    .doc-shell { padding: 1.25rem 1rem 2rem; border-radius: 0.75rem; }
  }
</style>
</head>
<body>

<header class="topbar">
  <button class="menu-btn" id="menuBtn" aria-label="開啟選單" aria-expanded="false">☰</button>
  <span class="wordmark">両雀<span class="dot">·</span>Ryōjaku</span>
  <span class="hub-label">後台中樞</span>
  <span class="tagline" id="tagline"></span>
  <span class="updated" id="updated"></span>
</header>

<div class="layout">
  <nav class="sidebar" id="sidebar" aria-label="模組導覽">
    <div class="search-box">
      <span class="glyph">⌕</span>
      <input type="search" id="filterInput" placeholder="篩選模組…" autocomplete="off">
    </div>
    <div id="navList"></div>
    <div class="no-match" id="noMatch">沒有符合的模組</div>
  </nav>

  <main class="main">
    <div class="doc-shell">
      <div class="doc-meta" id="docMeta" hidden></div>
      <div id="content" class="md">
        <div class="state-msg">
          <span class="big">🀄</span>
          <div class="title">載入中…</div>
          <div>正在讀取模組清單</div>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="overlay" id="overlay"></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
(function () {
  "use strict";

  var navList = document.getElementById("navList");
  var content = document.getElementById("content");
  var docMeta = document.getElementById("docMeta");
  var noMatch = document.getElementById("noMatch");
  var filterInput = document.getElementById("filterInput");
  var menuBtn = document.getElementById("menuBtn");
  var overlay = document.getElementById("overlay");

  var STATUS_LABEL = { live: "LIVE", design: "DESIGN" };
  var modules = [];        // flat list: { id, title, doc, status, icon, groupTitle, el }
  var activeId = null;
  var loadSeq = 0;

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function stateMsg(emoji, title, detail) {
    return '<div class="state-msg"><span class="big">' + emoji + '</span>' +
      '<div class="title">' + title + '</div><div>' + detail + '</div></div>';
  }

  function closeDrawer() {
    document.body.classList.remove("drawer-open");
    menuBtn.setAttribute("aria-expanded", "false");
  }

  menuBtn.addEventListener("click", function () {
    var open = document.body.classList.toggle("drawer-open");
    menuBtn.setAttribute("aria-expanded", open ? "true" : "false");
  });
  overlay.addEventListener("click", closeDrawer);

  /* ---------- Sidebar build ---------- */
  function buildNav(groups) {
    navList.innerHTML = "";
    groups.forEach(function (group) {
      var section = document.createElement("div");
      section.className = "nav-group";

      var title = document.createElement("div");
      title.className = "nav-group-title";
      title.textContent = group.title || group.id || "";
      section.appendChild(title);

      (group.modules || []).forEach(function (mod) {
        var btn = document.createElement("button");
        btn.type = "button";
        btn.className = "nav-item";
        btn.dataset.id = mod.id;
        btn.innerHTML =
          '<span class="icon">' + escapeHtml(mod.icon || "📄") + '</span>' +
          '<span class="label">' + escapeHtml(mod.title || mod.id) + '</span>' +
          '<span class="badge ' + (mod.status === "live" ? "live" : "design") + '">' +
          (STATUS_LABEL[mod.status] || escapeHtml(String(mod.status || "").toUpperCase())) + '</span>';
        var rec = {
          id: mod.id, title: mod.title || "", doc: mod.doc,
          type: mod.type, url: mod.url,
          status: mod.status, icon: mod.icon,
          groupTitle: group.title || "", el: btn, groupEl: section
        };
        btn.addEventListener("click", function () {
          selectModule(rec);
          closeDrawer();
        });
        section.appendChild(btn);

        modules.push(rec);
      });

      navList.appendChild(section);
    });
  }

  /* ---------- Filter ---------- */
  filterInput.addEventListener("input", function () {
    var q = filterInput.value.trim().toLowerCase();
    var visibleCount = 0;

    modules.forEach(function (m) {
      var hit = !q || m.title.toLowerCase().indexOf(q) !== -1 || m.id.toLowerCase().indexOf(q) !== -1;
      m.el.style.display = hit ? "" : "none";
      if (hit) visibleCount++;
    });

    // Hide group headers whose modules are all filtered out
    Array.prototype.forEach.call(navList.children, function (section) {
      var anyVisible = Array.prototype.some.call(
        section.querySelectorAll(".nav-item"),
        function (el) { return el.style.display !== "none"; }
      );
      section.style.display = anyVisible ? "" : "none";
    });

    noMatch.style.display = visibleCount === 0 ? "block" : "none";
  });

  /* ---------- Module selection + doc render ---------- */
  var docShell = document.querySelector(".doc-shell");

  function selectModule(mod) {
    activeId = mod.id;
    modules.forEach(function (m) {
      m.el.classList.toggle("active", m.id === activeId);
    });

    if (mod.type === "page" && mod.url) {
      renderPage(mod);
    } else {
      renderDoc(mod);
    }
  }

  /* Embedded live page (type: "page") */
  function renderPage(mod) {
    loadSeq++; // invalidate any in-flight doc fetch
    docShell.classList.add("page-mode");
    docMeta.hidden = true;

    content.innerHTML =
      '<div class="page-toolbar">' +
      '<span class="pt-icon">' + escapeHtml(mod.icon || "📄") + '</span>' +
      '<span class="pt-title">' + escapeHtml(mod.title || mod.id) + '</span>' +
      '<span class="badge ' + (mod.status === "live" ? "live" : "design") + '">' +
      (STATUS_LABEL[mod.status] || escapeHtml(String(mod.status || "").toUpperCase())) + '</span>' +
      '<span class="pt-spacer"></span>' +
      (mod.doc ? '<a href="#" class="pt-link" id="pageDocLink">📄 看設計冊</a>' : '') +
      '</div>' +
      '<iframe class="page-frame" src="' + escapeHtml(mod.url) + '" title="' + escapeHtml(mod.title || mod.id) + '"></iframe>';

    var docLink = document.getElementById("pageDocLink");
    if (docLink) {
      docLink.addEventListener("click", function (e) {
        e.preventDefault();
        renderDoc(mod);
      });
    }

    window.scrollTo({ top: 0 });
    try { history.replaceState(null, "", "#" + encodeURIComponent(mod.id)); } catch (e) {}
  }

  /* Markdown design doc */
  function renderDoc(mod) {
    docShell.classList.remove("page-mode");
    var isPage = mod.type === "page" && mod.url;

    docMeta.hidden = false;
    docMeta.innerHTML =
      '<span>' + escapeHtml(mod.icon || "📄") + '</span>' +
      '<span>' + escapeHtml(mod.groupTitle) + ' / ' + escapeHtml(mod.title) + '</span>' +
      '<span class="badge ' + (mod.status === "live" ? "live" : "design") + '">' +
      (STATUS_LABEL[mod.status] || "") + '</span>' +
      '<span class="path">' + escapeHtml(mod.doc) + '</span>';

    content.innerHTML = stateMsg("⏳", "載入文件中…", escapeHtml(mod.doc));

    var seq = ++loadSeq;
    fetch(mod.doc, { cache: "no-cache" })
      .then(function (res) {
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.text();
      })
      .then(function (mdText) {
        if (seq !== loadSeq) return; // stale response, user clicked elsewhere
        var backBar = isPage
          ? '<div class="page-toolbar in-doc"><a href="#" class="pt-link" id="backToPage">⬅ 回儀表板</a>' +
            '<span class="pt-title">' + escapeHtml(mod.title || mod.id) + ' · 設計冊</span></div>'
          : '';
        content.innerHTML = backBar + marked.parse(mdText, { gfm: true, breaks: false });
        if (isPage) {
          document.getElementById("backToPage").addEventListener("click", function (e) {
            e.preventDefault();
            renderPage(mod);
          });
        }
        content.scrollIntoView({ block: "start" });
        window.scrollTo({ top: 0 });
        try { history.replaceState(null, "", "#" + encodeURIComponent(mod.id)); } catch (e) {}
      })
      .catch(function (err) {
        if (seq !== loadSeq) return;
        var backBar = isPage
          ? '<div class="page-toolbar in-doc"><a href="#" class="pt-link" id="backToPage">⬅ 回儀表板</a></div>'
          : '';
        content.innerHTML = backBar + stateMsg(
          "🔶",
          "文件尚未就緒",
          '無法載入 <code>' + escapeHtml(mod.doc) + '</code>（' + escapeHtml(err.message) + '）。' +
          '<br>此模組可能還在設計中，文件建立後即會顯示於此。'
        );
        if (isPage) {
          document.getElementById("backToPage").addEventListener("click", function (e) {
            e.preventDefault();
            renderPage(mod);
          });
        }
      });
  }

  /* ---------- Boot ---------- */
  fetch("./modules.json", { cache: "no-cache" })
    .then(function (res) {
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    })
    .then(function (manifest) {
      document.title = (manifest.app || "後台中樞") + " — 後台中樞";
      document.getElementById("tagline").textContent = manifest.tagline || "";
      if (manifest.updated) {
        document.getElementById("updated").innerHTML =
          'UPDATED <b>' + escapeHtml(manifest.updated) + '</b>';
      }

      buildNav(manifest.groups || []);

      if (modules.length === 0) {
        content.innerHTML = stateMsg("📭", "沒有模組", "modules.json 裡沒有任何模組定義。");
        return;
      }

      // Deep link via #hash, else first module
      var hashId = decodeURIComponent((location.hash || "").replace(/^#/, ""));
      var initial = modules.find(function (m) { return m.id === hashId; }) || modules[0];
      selectModule(initial);
    })
    .catch(function (err) {
      content.innerHTML = stateMsg(
        "⚠️",
        "無法載入模組清單",
        '讀取 <code>./modules.json</code> 失敗（' + escapeHtml(err.message) + '）。' +
        '<br>請確認檔案存在，且此頁是透過 HTTP 伺服器開啟（例如 <code>python3 -m http.server</code>）。'
      );
    });
})();
</script>
</body>
</html>
