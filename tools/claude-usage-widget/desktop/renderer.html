<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>Claude 用量</title>
<style>
  :root{
    --ink:#e8f0ff; --dim:#8fa4c8; --faint:#5c7096;
    --line:rgba(120,160,220,.14);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
  html,body{margin:0;height:100%;background:transparent;overflow:hidden}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",system-ui,sans-serif;color:var(--ink)}

  /* 整個掛件 = 一塊圓角浮動玻璃 */
  .shell{
    position:fixed;inset:6px;border-radius:18px;
    background:linear-gradient(160deg,rgba(18,28,48,.82),rgba(9,14,24,.86));
    border:1px solid rgba(140,175,230,.16);
    box-shadow:0 18px 50px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05);
    backdrop-filter:blur(14px) saturate(1.1);
    display:flex;flex-direction:column;padding:10px 12px 10px;gap:9px;overflow:hidden;
  }
  header{display:flex;align-items:center;gap:9px;-webkit-app-region:drag}
  header .logo{width:22px;height:22px;border-radius:7px;flex:0 0 auto;
    background:linear-gradient(135deg,#d97757,#c25d3f);
    box-shadow:0 3px 10px rgba(217,119,87,.35), inset 0 1px 0 rgba(255,255,255,.25);
    display:grid;place-items:center;font-weight:800;font-size:12px;color:#1a0f0a}
  header h1{font-size:13px;letter-spacing:.3px;margin:0;font-weight:700;flex:1}
  .freshness{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--dim)}
  .pulse{width:7px;height:7px;border-radius:50%;background:#2fe0b0;animation:ping 2.4s ease-out infinite}
  .pulse.stale{background:#f7a83b;animation:none}
  @keyframes ping{0%{box-shadow:0 0 0 0 rgba(37,211,166,.5)}70%{box-shadow:0 0 0 6px rgba(37,211,166,0)}100%{box-shadow:0 0 0 0 rgba(37,211,166,0)}}
  .ctrl{-webkit-app-region:no-drag;display:flex;gap:4px;align-items:center}
  .ctrl button{-webkit-app-region:no-drag;width:22px;height:22px;border-radius:6px;cursor:pointer;
    border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--dim);
    font-size:12px;line-height:1;display:grid;place-items:center;padding:0}
  .ctrl button:hover{background:rgba(255,255,255,.1);color:var(--ink)}
  .ctrl button.on{color:#2fe0b0;border-color:rgba(47,224,176,.4)}

  .cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;flex:1;min-height:0}
  @media (max-width:460px){.cards{grid-template-columns:1fr}}

  .card{position:relative;border-radius:14px;padding:9px 9px 8px;
    background:linear-gradient(180deg,rgba(30,44,72,.5),rgba(14,24,42,.55));
    border:1px solid var(--line);display:flex;flex-direction:column;gap:8px;overflow:hidden}
  .card .title{display:flex;align-items:center;gap:7px}
  .card .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .card .name{font-weight:700;font-size:12.5px}
  .card .badge{margin-left:auto;font-size:9px;color:var(--dim);border:1px solid var(--line);padding:1px 6px;border-radius:999px}

  .tanks{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;flex:1;min-height:0}
  .tank{display:flex;flex-direction:column;align-items:center;gap:5px;min-height:0}
  .tank .cap{font-size:9.5px;color:var(--dim);letter-spacing:.3px;font-weight:600}
  .glass{position:relative;width:100%;flex:1;min-height:74px;border-radius:10px;
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.01));
    border:1px solid rgba(150,185,235,.16);
    box-shadow:inset 0 2px 8px rgba(0,0,0,.45);overflow:hidden}
  .glass canvas{position:absolute;inset:0;width:100%;height:100%}
  .glass::after{content:"";position:absolute;left:8%;top:4%;width:18%;height:80%;border-radius:40%;
    background:linear-gradient(180deg,rgba(255,255,255,.14),transparent);filter:blur(1px);pointer-events:none}
  .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
  .pct b{font-size:19px;font-weight:800;line-height:1;text-shadow:0 1px 6px rgba(0,0,0,.55)}
  .pct small{font-size:9px;font-weight:600;opacity:.85;margin-top:1px}
  .reset{font-size:9px;color:var(--faint);text-align:center;min-height:12px}

  .card.dead::before{content:"";position:absolute;inset:0;z-index:5;background:rgba(9,14,24,.55);backdrop-filter:blur(2px)}
  .deadmsg{position:absolute;inset:0;z-index:6;display:none;flex-direction:column;align-items:center;justify-content:center;gap:5px;text-align:center;padding:10px}
  .card.dead .deadmsg{display:flex}
  .deadmsg .ic{font-size:22px}
  .deadmsg .t{font-weight:700;font-size:12px;color:#cdd8ee}
  .deadmsg .s{font-size:10px;color:var(--dim);line-height:1.5}
</style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="logo">✳</div>
      <h1>Claude 用量</h1>
      <div class="freshness"><span id="pulse" class="pulse"></span><span id="ago">—</span></div>
      <div class="ctrl">
        <button id="pin" class="on" title="永遠最上層">📌</button>
        <button id="close" title="關閉">✕</button>
      </div>
    </header>
    <div class="cards" id="cards"></div>
  </div>

<script>
const { ipcRenderer } = require('electron');
document.getElementById('close').onclick = () => ipcRenderer.send('app-quit');
let pinned = true;
document.getElementById('pin').onclick = (e) => {
  pinned = !pinned;
  ipcRenderer.send('toggle-top', pinned);
  e.currentTarget.classList.toggle('on', pinned);
};

const SRC = 'https://image.boyplaymj.link/claude-usage/2ec4944df2140d58/usage.json';
const POLL_MS = 30000;
const METRICS = [{key:'session',cap:'5 小時'},{key:'weekly',cap:'每週'},{key:'fable',cap:'Fable'}];

function grade(pct){
  if(pct>=85) return {a:'#ff7a8a',b:'#e84860',glow:'rgba(232,72,96,.55)',ink:'#ffd7dd'};
  if(pct>=60) return {a:'#ffcf5c',b:'#f7a83b',glow:'rgba(247,168,59,.5)', ink:'#fff0cf'};
  return       {a:'#2fe0b0',b:'#0fb488',glow:'rgba(37,211,166,.45)',ink:'#d6fff2'};
}

class Tank{
  constructor(c){this.c=c;this.ctx=c.getContext('2d');this.cur=0;this.target=0;this.pct=0;this.phase=(c.width%7)+1;this.bubbles=[];}
  set(p){this.pct=p;this.target=Math.max(0,Math.min(100,p))/100;}
  resize(){const r=this.c.getBoundingClientRect(),d=window.devicePixelRatio||1;this.c.width=Math.max(1,r.width*d);this.c.height=Math.max(1,r.height*d);this.w=r.width;this.h=r.height;this.ctx.setTransform(d,0,0,d,0,0);}
  step(dt){
    this.cur+=(this.target-this.cur)*Math.min(1,dt*3.2);this.phase+=dt*1.1;
    const g=grade(this.pct),{ctx,w,h}=this;if(!w)return;ctx.clearRect(0,0,w,h);
    const level=h*(1-this.cur),amp=Math.min(5,1.6+this.cur*3.4),step=6;
    const grd=ctx.createLinearGradient(0,level-amp,0,h);grd.addColorStop(0,g.a);grd.addColorStop(1,g.b);
    ctx.fillStyle=grd;ctx.beginPath();ctx.moveTo(0,h);ctx.lineTo(0,level);
    for(let x=0;x<=w;x+=step){const y=level+Math.sin(x/34+this.phase)*amp+Math.sin(x/15-this.phase*1.6)*amp*0.4;ctx.lineTo(x,y);}
    ctx.lineTo(w,h);ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=1.3;ctx.beginPath();
    for(let x=0;x<=w;x+=step){const y=level+Math.sin(x/34+this.phase)*amp+Math.sin(x/15-this.phase*1.6)*amp*0.4;x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
    ctx.stroke();
    ctx.save();ctx.globalAlpha=.5;ctx.shadowColor=g.glow;ctx.shadowBlur=14;ctx.strokeStyle=g.a;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,level);ctx.lineTo(w,level);ctx.stroke();ctx.restore();
    if(this.cur>0.06&&Math.random()<dt*3)this.bubbles.push({x:Math.random()*w,y:h-2,r:1+Math.random()*2,v:14+Math.random()*20});
    ctx.fillStyle='rgba(255,255,255,.35)';
    this.bubbles=this.bubbles.filter(b=>{b.y-=b.v*dt;const surf=level+Math.sin(b.x/34+this.phase)*amp;if(b.y<surf+1)return false;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,7);ctx.fill();return true;});
  }
}

const tanks=[];let resets={},lastUpdated=0;
function buildCards(accounts){
  const root=document.getElementById('cards');root.innerHTML='';tanks.length=0;
  accounts.forEach((acc,ai)=>{
    const card=document.createElement('div');card.className='card';
    const okColor=acc.dead?'#ff7a8a':(acc.ok?'#2fe0b0':'#f7a83b');
    card.innerHTML=`<div class="title"><span class="dot" style="background:${okColor};box-shadow:0 0 8px ${okColor}"></span>
      <span class="name">${acc.label||acc.slot}</span><span class="badge">${acc.slot}</span></div>
      <div class="tanks"></div>
      <div class="deadmsg"><div class="ic">🔌</div><div class="t">${acc.error||'無法讀取'}</div>
        <div class="s">此帳號登入已失效<br>重新登入即可恢復</div></div>`;
    const te=card.querySelector('.tanks');
    METRICS.forEach(m=>{
      const t=document.createElement('div');t.className='tank';
      t.innerHTML=`<div class="cap">${m.cap}</div><div class="glass"><canvas></canvas>
        <div class="pct"><b>—</b><small>%</small></div></div><div class="reset"></div>`;
      te.appendChild(t);
      tanks.push({tank:new Tank(t.querySelector('canvas')),pctEl:t.querySelector('.pct b'),inkEl:t.querySelector('.pct'),resetEl:t.querySelector('.reset'),key:m.key,ai});
    });
    if(acc.dead)card.classList.add('dead');
    root.appendChild(card);
  });
  requestAnimationFrame(()=>tanks.forEach(o=>o.tank.resize()));
}

function apply(data){
  const accs=data.accounts||[];
  const sig=accs.map(a=>a.slot+':'+(a.dead?'D':'L')).join(',');
  if(sig!==apply._sig){buildCards(accs);apply._sig=sig;}
  tanks.forEach(o=>{
    const acc=accs[o.ai],m=acc&&acc[o.key];
    if(acc&&acc.ok&&m){const pct=Math.round(m.pct);o.tank.set(pct);o.pctEl.textContent=pct;o.inkEl.style.color=grade(pct).ink;resets[o.ai+o.key]=m.resets_at||0;}
    else if(acc&&acc.dead){o.tank.set(0);o.pctEl.textContent='—';}
  });
  lastUpdated=data.updated||Math.floor(Date.now()/1000);
}

function fmtLeft(s){if(s<=0)return'';const d=Math.floor(s/86400),h=Math.floor(s%86400/3600),m=Math.floor(s%3600/60);if(d>0)return`${d}天${h}時後重置`;if(h>0)return`${h}時${m}分後重置`;return`${m}分後重置`;}
function tickLabels(){
  const now=Math.floor(Date.now()/1000);
  tanks.forEach(o=>{const r=resets[o.ai+o.key];o.resetEl.textContent=r?fmtLeft(r-now):'';});
  const age=now-lastUpdated,ago=document.getElementById('ago'),pulse=document.getElementById('pulse');
  ago.textContent=lastUpdated?(age<60?`${age} 秒前`:`${Math.floor(age/60)} 分前`):'連線中…';
  pulse.classList.toggle('stale',age>120);
}

async function poll(){
  try{const r=await fetch(SRC+'?t='+Date.now(),{cache:'no-store'});if(!r.ok)throw 0;apply(await r.json());}
  catch(e){if(!apply._sig)apply({accounts:[{slot:'main',label:'Main',ok:false,error:'連線中…'},{slot:'backup1',label:'Backup1',ok:false,error:'連線中…'}]});}
}
let last=performance.now();
function frame(t){const dt=Math.min(.05,(t-last)/1000);last=t;tanks.forEach(o=>o.tank.step(dt));requestAnimationFrame(frame);}
window.addEventListener('resize',()=>tanks.forEach(o=>o.tank.resize()));
poll();setInterval(poll,POLL_MS);setInterval(tickLabels,1000);requestAnimationFrame(frame);
</script>
</body>
</html>
