<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:"Noto Serif CJK TC","Noto Sans CJK TC",serif;}
  html,body{background:#1a1815;}
  .stage{width:900px;height:1180px;background:#f7f4ec;color:#1e1b16;position:relative;display:flex;flex-direction:column;padding:44px 52px;}
  .top{display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #1e1b16;padding-bottom:12px;}
  .top .brand{font-size:24px;font-weight:900;letter-spacing:3px;}
  .top .brand small{display:block;font-size:12px;letter-spacing:4px;color:#7a7266;font-family:"Noto Sans CJK TC";margin-top:2px;}
  .top .sale{text-align:right;font-size:13px;color:#5a5348;line-height:1.7;letter-spacing:1px;font-family:"Noto Sans CJK TC";}
  .lot{display:flex;gap:34px;margin-top:26px;}
  .plate{flex:none;width:360px;height:540px;background:#eceadf url('m3-painting.png') center/cover;border:1px solid #cabf a6;box-shadow:0 3px 8px rgba(0,0,0,.25);border:1px solid #c9bfa6;}
  .info{flex:1;display:flex;flex-direction:column;}
  .lotno{font-size:15px;letter-spacing:3px;color:#8a1414;font-weight:800;font-family:"Noto Sans CJK TC";}
  h1{font-size:34px;font-weight:900;letter-spacing:2px;margin:8px 0 4px;}
  .attr{font-size:19px;color:#3a352c;margin-bottom:16px;letter-spacing:1px;}
  .meta{font-size:15px;line-height:2.05;color:#2a261f;font-family:"Noto Sans CJK TC";border-top:1px solid #cfc7b5;padding-top:14px;}
  .meta .k{display:inline-block;width:78px;color:#7a7266;}
  .est{margin-top:22px;padding:16px 18px;background:#1e1b16;color:#f3efe4;}
  .est .l{font-size:13px;letter-spacing:3px;color:#c9bfa6;font-family:"Noto Sans CJK TC";}
  .est .v{font-size:27px;font-weight:900;letter-spacing:1px;margin-top:4px;}
  .prov{margin-top:16px;font-size:13.5px;line-height:1.9;color:#5a5348;font-family:"Noto Sans CJK TC";}
  .foot{margin-top:auto;border-top:1px solid #cfc7b5;padding-top:14px;font-size:12.5px;color:#8a8072;display:flex;justify-content:space-between;letter-spacing:1px;font-family:"Noto Sans CJK TC";}
</style></head>
<body>
  <div class="stage">
    <div class="top">
      <div class="brand">明硯藝廊<small>MINGYAN GALLERY</small></div>
      <div class="sale">秋季拍賣　中國近代書畫專場<br>預展 114.10.02–10.03　拍賣 114.10.04（六）</div>
    </div>
    <div class="lot">
      <div class="plate"></div>
      <div class="info">
        <div class="lotno">Lot 077</div>
        <h1>谿山行旅圖</h1>
        <div class="attr">傳　柯懷山（1849–1917）　設色紙本・立軸</div>
        <div class="meta">
          <div><span class="k">尺寸</span>約 138.5 × 68 公分</div>
          <div><span class="k">款識</span>右上自題並鈐印二方</div>
          <div><span class="k">品相</span>裱工完整，設色典雅，保存良好</div>
          <div><span class="k">附</span>本館鑑定意見書（辦理中）</div>
        </div>
        <div class="est">
          <div class="l">估　價　ESTIMATE</div>
          <div class="v">NT$ 3,800,000 – 5,200,000</div>
        </div>
        <div class="prov">來源：城中舊藏，遞藏有序。本幅為本季近代書畫專場封面拍品，藝廊重點推介。</div>
      </div>
    </div>
    <div class="foot"><span>明硯藝廊　秋季拍賣圖錄</span><span>Lot 077 ／ 谿山行旅圖</span></div>
  </div>
</body>
</html>
