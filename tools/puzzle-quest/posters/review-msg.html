<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:"Noto Sans CJK TC",sans-serif;}
  .phone{width:720px;height:1180px;background:#f2f3f5;position:relative;display:flex;flex-direction:column;}
  .status{height:44px;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 26px;color:#222;font-size:22px;font-weight:600;}
  .nav{height:66px;background:#ff5722;display:flex;align-items:center;padding:0 20px;color:#fff;gap:14px;font-size:24px;font-weight:700;}
  .nav .back{font-size:30px;} .nav .cart{margin-left:auto;font-size:26px;}
  .prod{background:#fff;display:flex;gap:16px;padding:18px 20px;align-items:center;border-bottom:8px solid #eceef0;}
  .thumb{width:96px;height:96px;border-radius:10px;background:linear-gradient(135deg,#cdd8cf,#a7bcae);display:flex;align-items:center;justify-content:center;font-size:34px;}
  .prod .pi .pname{font-size:22px;color:#222;font-weight:600;line-height:1.3;}
  .prod .pi .price{color:#ff5722;font-size:24px;font-weight:800;margin-top:8px;}
  .sechd{padding:16px 20px 8px;font-size:20px;color:#333;font-weight:700;}
  .rv{background:#fff;padding:20px;}
  .rvhd{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
  .ava{width:52px;height:52px;border-radius:50%;background:#ffd8cc;display:flex;align-items:center;justify-content:center;color:#ff5722;font-size:22px;font-weight:700;}
  .uname{font-size:20px;color:#333;font-weight:600;} .udate{font-size:15px;color:#999;margin-top:2px;}
  .stars{color:#ffb400;font-size:24px;letter-spacing:3px;margin:6px 0 14px;}
  .rvtext{font-size:23px;line-height:2.05;color:#2a2a2a;}
  .foot{padding:16px 20px;color:#aaa;font-size:15px;}
</style></head>
<body>
  <div class="phone">
    <div class="status"><div>03:11</div><div>📶 5G 🔋14%</div></div>
    <div class="nav"><span class="back">‹</span><span>商品評價</span><span class="cart">🛒</span></div>
    <div class="prod">
      <div class="thumb">📦</div>
      <div class="pi"><div class="pname">折疊收納箱 大容量 附蓋可堆疊</div><div class="price">NT$299</div></div>
    </div>
    <div class="sechd">⭐ 最新評價</div>
    <div class="rv">
      <div class="rvhd"><div class="ava">匿</div><div><div class="uname">匿名買家 h****9</div><div class="udate">2026-07-09 03:11 · 已購買認證</div></div></div>
      <div class="stars">★★★★★</div>
      <div class="rvtext">
        <div>門把設計很好握，質感一流。</div>
        <div>被子收納袋隨箱附贈，很貼心。</div>
        <div>他牌的我買過，完全比不上這個。</div>
        <div>鎖扣牢固，怎麼搖都不會開。</div>
        <div>了不起的做工，一定會回購。</div>
      </div>
    </div>
    <div class="foot">此評價對你有幫助嗎？　👍 0　👎 0　·　檢舉</div>
  </div>
</body></html>
