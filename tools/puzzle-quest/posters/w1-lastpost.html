<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:"Noto Sans CJK TC",sans-serif;}
  html,body{background:#111;}
  .stage{width:640px;background:#fff;color:#111;position:relative;overflow:hidden;}
  .hd{display:flex;align-items:center;gap:12px;padding:12px 14px;}
  .av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#f09433,#dc2743,#bc1888);padding:2px;}
  .av i{display:block;width:100%;height:100%;border-radius:50%;background:#5a6b7a;}
  .nm{flex:1;line-height:1.25;}
  .nm b{font-size:18px;}
  .nm small{display:block;font-size:13px;color:#555;}
  .more{font-size:22px;color:#333;letter-spacing:2px;}
  /* photo：深夜窗外城市（純 CSS） */
  .photo{width:640px;height:640px;position:relative;background:linear-gradient(180deg,#0d1622 0%,#14202f 44%,#1b1410 100%);overflow:hidden;}
  .sky{position:absolute;inset:0 0 46% 0;background:radial-gradient(ellipse at 70% 20%,rgba(60,90,130,.5),transparent 60%);}
  .sky::after{content:"";position:absolute;left:18%;top:22%;width:6px;height:6px;border-radius:50%;background:#cfd8e6;box-shadow:60px 30px #b9c4d4,140px 12px #aab6c8,220px 40px #cfd8e6,300px 20px #9aa7ba,380px 46px #c2ccdc,120px 70px #98a6ba;opacity:.6;}
  .frame{position:absolute;inset:0;border:14px solid #0a0f16;box-shadow:inset 0 0 60px rgba(0,0,0,.7);}
  .frame .bar{position:absolute;left:50%;top:0;bottom:0;width:8px;background:#0a0f16;transform:translateX(-50%);}
  .city{position:absolute;left:0;right:0;top:40%;height:32%;background:
    linear-gradient(#0b1a29,#08131d);
    clip-path:polygon(0 100%,0 55%,7% 55%,7% 30%,15% 30%,15% 62%,24% 62%,24% 20%,33% 20%,33% 58%,44% 58%,44% 40%,55% 40%,55% 66%,66% 66%,66% 26%,76% 26%,76% 60%,86% 60%,86% 44%,100% 44%,100% 100%);}
  .city::after{content:"";position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,214,140,.9) 1px,transparent 1.4px);background-size:22px 26px;opacity:.5;}
  .refl{position:absolute;left:0;right:0;bottom:0;height:26%;background:linear-gradient(rgba(255,190,120,.06),rgba(0,0,0,0));}
  .grain{position:absolute;inset:0;pointer-events:none;opacity:.14;mix-blend-mode:overlay;background:repeating-radial-gradient(circle at 30% 40%,#000 0,transparent 2px);}
  .act{display:flex;gap:16px;padding:12px 14px 6px;font-size:24px;}
  .act .sp{flex:1;}
  .likes{padding:0 14px;font-size:15px;font-weight:700;}
  .cap{padding:6px 14px 4px;font-size:17px;line-height:1.55;}
  .cap b{margin-right:6px;}
  .tm{padding:2px 14px 16px;font-size:12px;color:#8a8a8a;letter-spacing:1px;}
</style></head>
<body>
  <div class="stage">
    <div class="hd">
      <div class="av"><i></i></div>
      <div class="nm"><b>lin_yuxiang</b><small>城中・文山路</small></div>
      <div class="more">···</div>
    </div>
    <div class="photo">
      <div class="sky"></div>
      <div class="city"></div>
      <div class="refl"></div>
      <div class="frame"><div class="bar"></div></div>
      <div class="grain"></div>
    </div>
    <div class="act">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#222" stroke-width="1.8"><path d="M20.8 4.6a5 5 0 0 0-7 0L12 6.3l-1.8-1.7a5 5 0 1 0-7 7L12 20l8.8-8.4a5 5 0 0 0 0-7z"/></svg>
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#222" stroke-width="1.8"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.4 9 9 0 0 1-3.9-.9L3 20l1-4.1A8.4 8.4 0 1 1 21 11.5z"/></svg>
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#222" stroke-width="1.8"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4z"/></svg>
      <span class="sp"></span>
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#222" stroke-width="1.8"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    </div>
    <div class="likes">23 人說讚</div>
    <div class="cap"><b>lin_yuxiang</b>連加三天班，終於告一段落。好累，只想好好休息一下。下個月換個地方，重新開始。</div>
    <div class="tm">3 月 5 日</div>
  </div>
</body>
</html>
