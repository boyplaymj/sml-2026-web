<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:"Noto Sans CJK TC",sans-serif;}
  html,body{background:#222;}
  .phone{width:720px;height:1180px;background:#c9b8b0;position:relative;display:flex;flex-direction:column;}
  .status{height:44px;background:#8a7269;display:flex;align-items:center;justify-content:space-between;padding:0 26px;color:#fff;font-size:22px;font-weight:600;}
  .head{height:80px;background:#7a5f56;display:flex;align-items:center;padding:0 20px;color:#fff;gap:14px;}
  .head .back{font-size:30px;}
  .head .av{width:48px;height:48px;border-radius:50%;background:#3a2b26;flex:none;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;}
  .head .name{font-size:25px;font-weight:700;flex:1;}
  .head .name small{display:block;font-size:15px;font-weight:400;opacity:.85;}
  .head .ic{font-size:26px;opacity:.9;}
  .msgs{flex:1;padding:22px 22px 30px;display:flex;flex-direction:column;gap:14px;overflow:hidden;}
  .day{align-self:center;background:rgba(0,0,0,.24);color:#fff;font-size:16px;padding:5px 16px;border-radius:14px;margin:4px 0;}
  .row{display:flex;align-items:flex-start;gap:9px;max-width:80%;}
  .row.me{align-self:flex-end;flex-direction:row-reverse;}
  .col{display:flex;flex-direction:column;gap:3px;}
  .line{display:flex;align-items:flex-end;gap:8px;}
  .row.me .line{flex-direction:row-reverse;}
  .bubble{padding:13px 17px;font-size:22px;line-height:1.5;border-radius:20px;}
  .them .bubble{background:#fff;color:#1a1a1a;border-top-left-radius:6px;}
  .me .bubble{background:#95ec69;color:#12300a;border-top-right-radius:6px;}
  .time{font-size:14px;color:#5a4a44;white-space:nowrap;}
</style></head>
<body>
  <div class="phone">
    <div class="status"><div>08:15</div><div style="display:flex;align-items:center;gap:7px;font-size:20px;"><svg width="24" height="18" viewBox="0 0 24 18" fill="#fff"><path d="M12 4C7.5 4 3.7 6.4 1.5 9.2L12 17 22.5 9.2C20.3 6.4 16.5 4 12 4z"/></svg><span>5G</span><span style="display:inline-block;width:30px;height:15px;border:2px solid #fff;border-radius:3px;position:relative;"><span style="position:absolute;right:-4px;top:4px;width:3px;height:5px;background:#fff;"></span><span style="display:block;height:100%;width:44%;background:#fff;"></span></span></div></div>
    <div class="head">
      <div class="back">‹</div>
      <div class="av">榮</div>
      <div class="name">阿榮<small>（韓子謙 手機・已扣案）</small></div>
      <div class="ic">☰</div>
    </div>
    <div class="msgs">
      <div class="day">3月6日 星期四</div>

      <div class="row me"><div class="col">
        <div class="line"><div class="time">08:02</div><div class="bubble">阿榮 幫我一個忙</div></div>
        <div class="line"><div class="bubble">如果之後有人問起 那天晚上我一直在台中跟你在一起 好嗎</div></div>
      </div></div>
      <div class="row them"><div class="col"><div class="line"><div class="bubble">台中？你那晚不是說要回城中處理事情…</div><div class="time">08:06</div></div></div></div>
      <div class="row me"><div class="col">
        <div class="line"><div class="time">08:09</div><div class="bubble">叫你說就說 別問那麼多</div></div>
        <div class="line"><div class="bubble">就說我整晚都跟你在台中 一步都沒離開</div></div>
      </div></div>
      <div class="row them"><div class="col"><div class="line"><div class="bubble">…子謙 出什麼事了</div><div class="time">08:12</div></div></div></div>
      <div class="row me"><div class="col"><div class="line"><div class="time">08:13</div><div class="bubble">沒事 記得就好</div></div></div></div>
    </div>
  </div>
</body>
</html>
