<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:"Noto Sans CJK TC",sans-serif;}
  html,body{background:#222;}
  .phone{width:720px;height:1180px;background:#2e3742;position:relative;display:flex;flex-direction:column;}
  .status{height:44px;background:#242c35;display:flex;align-items:center;justify-content:space-between;padding:0 26px;color:#fff;font-size:22px;font-weight:600;}
  .head{height:80px;background:#1f2730;display:flex;align-items:center;padding:0 20px;color:#fff;gap:14px;border-bottom:1px solid #3a4550;}
  .head .back{font-size:30px;}
  .head .av{width:48px;height:48px;border-radius:50%;background:#5a6673;flex:none;display:flex;align-items:center;justify-content:center;font-size:20px;color:#e8edf2;}
  .head .name{font-size:24px;font-weight:700;flex:1;}
  .head .name small{display:block;font-size:14px;font-weight:400;opacity:.7;}
  .warn{background:#3a2416;color:#f0c07a;font-size:14px;text-align:center;padding:8px;letter-spacing:1px;}
  .msgs{flex:1;padding:22px;display:flex;flex-direction:column;gap:14px;}
  .day{align-self:center;background:rgba(255,255,255,.14);color:#d8dee6;font-size:15px;padding:5px 16px;border-radius:14px;}
  .row{display:flex;align-items:flex-end;gap:8px;max-width:86%;}
  .row.me{align-self:flex-end;flex-direction:row-reverse;}
  .av2{width:44px;height:44px;border-radius:50%;background:#5a6673;flex:none;display:flex;align-items:center;justify-content:center;font-size:18px;color:#e8edf2;}
  .col{display:flex;flex-direction:column;gap:3px;}
  .who{font-size:14px;color:#aeb8c4;margin-left:4px;}
  .line{display:flex;align-items:flex-end;gap:8px;}
  .row.me .line{flex-direction:row-reverse;}
  .bubble{padding:14px 18px;font-size:22px;line-height:1.5;border-radius:20px;}
  .them .bubble{background:#fbfbfb;color:#141414;border-top-left-radius:6px;}
  .me .bubble{background:#8de05a;color:#12300a;border-top-right-radius:6px;}
  .time{font-size:13px;color:#9aa5b1;white-space:nowrap;}
  .recall{font-style:italic;color:#8a95a1;font-size:19px;padding:12px 16px;border:1px dashed #4a5560;border-radius:16px;}
</style></head>
<body>
  <div class="phone">
    <div class="status"><div>00:45</div><div style="display:flex;align-items:center;gap:7px;font-size:20px;"><svg width="24" height="18" viewBox="0 0 24 18" fill="#fff"><path d="M12 4C7.5 4 3.7 6.4 1.5 9.2L12 17 22.5 9.2C20.3 6.4 16.5 4 12 4z"/></svg><span>5G</span><span style="display:inline-block;width:30px;height:15px;border:2px solid #fff;border-radius:3px;position:relative;"><span style="position:absolute;right:-4px;top:4px;width:3px;height:5px;background:#fff;"></span><span style="display:block;height:100%;width:44%;background:#fff;"></span></span></div></div>
    <div class="head"><div class="back">‹</div><div class="av">郭</div><div class="name">郭立文 協理<small>訊息（鑑識還原）</small></div></div>
    <div class="warn">※ 本對話為手機鑑識還原之刪除訊息</div>
    <div class="msgs">
      <div class="day">6月18日 星期三</div>
      <div class="row them"><div class="av2">郭</div><div class="col"><div class="who">郭立文 → 陳志偉</div>
        <div class="line"><div class="bubble">A1128 的事到此為止，誰都別再提。</div><div class="time">00:18</div></div>
        <div class="line"><div class="bubble">出貨照走。放行單你處理好了吧。</div><div class="time">00:19</div></div>
      </div></div>
      <div class="row me"><div class="col"><div class="line"><div class="time">00:21</div><div class="bubble">…嗯。我知道了。</div></div></div></div>
      <div class="row them"><div class="av2">郭</div><div class="col">
        <div class="line"><div class="bubble">她的事就是意外。記住。</div><div class="time">00:22</div></div>
      </div></div>
      <div class="row me"><div class="col"><div class="line"><div class="time">00:40</div><div class="recall">（此訊息已收回）</div></div></div></div>
    </div>
  </div>
</body>
</html>
