<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:"Noto Serif CJK TC","Noto Sans CJK TC",serif;}
  html,body{background:#1c1a17;}
  .stage{width:900px;height:1180px;position:relative;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 46% 28%,#3a362f,#161411 84%);}
  .card{position:relative;width:660px;background:#fbfaf5;color:#1a1a1a;border:10px solid #17130d;box-shadow:0 6px 12px rgba(0,0,0,.4),0 34px 70px rgba(0,0,0,.65);padding:8px;}
  .inner{border:2px solid #17130d;padding:52px 54px 42px;text-align:center;}
  .top{font-size:17px;letter-spacing:6px;color:#5a544a;margin-bottom:16px;}
  h1{font-size:52px;font-weight:900;letter-spacing:16px;color:#17130d;margin-bottom:8px;text-indent:16px;}
  .rule{width:120px;height:3px;background:#17130d;margin:18px auto 30px;}
  .who{font-size:29px;font-weight:700;letter-spacing:3px;margin-bottom:6px;}
  .who b{font-size:38px;letter-spacing:5px;margin:0 6px;}
  .date{font-size:21px;letter-spacing:2px;color:#2a261f;margin-bottom:28px;line-height:1.9;}
  .body{font-size:20px;line-height:2.15;letter-spacing:1.5px;text-align:justify;color:#26221b;margin-bottom:30px;}
  .note{font-size:18px;letter-spacing:2px;color:#5a544a;border-top:1px solid #cfc7b8;padding-top:22px;margin-bottom:34px;line-height:2;}
  .sign{font-size:23px;font-weight:700;letter-spacing:3px;color:#17130d;line-height:2;}
  .sign small{display:block;font-size:16px;font-weight:400;letter-spacing:2px;color:#5a544a;margin-top:4px;}
  .ribbon{position:absolute;left:-6px;top:38px;width:14px;height:150px;background:#17130d;}
  .ribbon2{position:absolute;right:-6px;top:38px;width:14px;height:150px;background:#17130d;}
</style></head>
<body>
  <div class="stage">
    <div class="card">
      <div class="ribbon"></div><div class="ribbon2"></div>
      <div class="inner">
        <div class="top">明硯藝廊　MINGYAN GALLERY</div>
        <h1>沉痛公告</h1>
        <div class="rule"></div>
        <div class="who">本館資深書畫鑑定師<b>沈維鈞</b>先生</div>
        <div class="date">慟於中華民國一一四年九月十七日夜辭世<br>享年五十二歲</div>
        <div class="body">沈先生鑑藏功深、治學嚴謹，任職本館多年，經手書畫鑑定無數，提攜後進、盡忠職守，深受同仁敬重。驚聞噩耗，全館同感哀慟，謹此敬告各界先進與往來藏家。</div>
        <div class="note">治喪事宜另行通知　懇辭花籃奠儀<br>館務照常運作，近期展務如有異動當即公告</div>
        <div class="sign">明硯藝廊　敬啟<small>中華民國一一四年九月十八日</small></div>
      </div>
    </div>
  </div>
</body>
</html>
