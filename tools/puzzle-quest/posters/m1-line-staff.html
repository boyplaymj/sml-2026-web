<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:"Noto Sans CJK TC",sans-serif;}
  html,body{background:#222;}
  .phone{width:720px;height:1180px;background:#8fb0c9;position:relative;display:flex;flex-direction:column;}
  .status{height:44px;background:#5f82a0;display:flex;align-items:center;justify-content:space-between;padding:0 26px;color:#fff;font-size:22px;font-weight:600;}
  .head{height:80px;background:#557295;display:flex;align-items:center;padding:0 20px;color:#fff;gap:14px;}
  .head .back{font-size:30px;}
  .head .av{width:48px;height:48px;border-radius:50%;background:#cdd8e6;flex:none;display:flex;align-items:center;justify-content:center;font-size:20px;color:#557295;font-weight:700;}
  .head .name{font-size:25px;font-weight:700;flex:1;}
  .head .name small{display:block;font-size:15px;font-weight:400;opacity:.85;}
  .head .ic{font-size:26px;opacity:.9;}
  .msgs{flex:1;padding:22px 22px 24px;display:flex;flex-direction:column;justify-content:flex-end;gap:14px;overflow:hidden;}
  .day{align-self:center;background:rgba(0,0,0,.26);color:#fff;font-size:16px;padding:5px 16px;border-radius:14px;margin:4px 0;}
  .row{display:flex;align-items:flex-start;gap:9px;max-width:82%;}
  .av2{width:46px;height:46px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;font-weight:700;}
  .a1{background:#a58bb8;}.a2{background:#7fae7f;}.a3{background:#c8a35a;}.a4{background:#6f9fc4;}
  .col{display:flex;flex-direction:column;gap:3px;}
  .who{font-size:15px;color:#2c3a4e;margin-left:4px;}
  .line{display:flex;align-items:flex-end;gap:8px;}
  .bubble{padding:13px 17px;font-size:22px;line-height:1.5;border-radius:20px;background:#fff;color:#1a1a1a;border-top-left-radius:6px;}
  .time{font-size:14px;color:#334;white-space:nowrap;}
</style></head>
<body>
  <div class="phone">
    <div class="status"><div>12:41</div><div style="display:flex;align-items:center;gap:7px;font-size:20px;"><svg width="24" height="18" viewBox="0 0 24 18" fill="#fff"><path d="M12 4C7.5 4 3.7 6.4 1.5 9.2L12 17 22.5 9.2C20.3 6.4 16.5 4 12 4z"/></svg><span>5G</span><span style="display:inline-block;width:30px;height:15px;border:2px solid #fff;border-radius:3px;position:relative;"><span style="position:absolute;right:-4px;top:4px;width:3px;height:5px;background:#fff;"></span><span style="display:block;height:100%;width:52%;background:#fff;"></span></span></div></div>
    <div class="head">
      <div class="back">‹</div>
      <div class="av">硯</div>
      <div class="name">明硯藝廊・同仁<small>成員 14 人</small></div>
      <div class="ic"><svg width="26" height="26" viewBox="0 0 24 24" stroke="#fff" stroke-width="2.2" fill="none"><path d="M3 6h18M3 12h18M3 18h18"/></svg></div>
    </div>
    <div class="msgs">
      <div class="day">9月18日 星期四</div>
      <div class="row"><div class="av2 a1">雅</div><div class="col"><div class="who">小雅</div><div class="line"><div class="bubble">聽說沈老師今天早上被發現在修復室……走了，好不真實。</div><div class="time">11:52</div></div></div></div>
      <div class="row"><div class="av2 a2">德</div><div class="col"><div class="who">阿德</div><div class="line"><div class="bubble">昨天我下班還看到他一個人在裡面看畫，他都嘛加班到半夜。</div><div class="time">11:55</div></div></div></div>
      <div class="row"><div class="av2 a3">Ｗ</div><div class="col"><div class="who">Ｗ姊</div><div class="line"><div class="bubble">那間的檢視燈箱超舊的啊，早該換了，跟館裡反映多少次。</div><div class="time">11:58</div></div></div></div>
      <div class="row"><div class="av2 a1">雅</div><div class="col"><div class="who">小雅</div><div class="line"><div class="bubble">檢警來採證了，這時候先別亂傳喔。</div><div class="time">12:07</div></div></div></div>
      <div class="row"><div class="av2 a4">昀</div><div class="col"><div class="who">小昀</div><div class="line"><div class="bubble">對了……昨晚我走的時候，還看到卓文瀚桌上那本筆記攤著，密密麻麻的，不曉得在寫什麼。</div><div class="time">12:19</div></div></div></div>
      <div class="row"><div class="av2 a2">德</div><div class="col"><div class="who">阿德</div><div class="line"><div class="bubble">這時候就別多想了啦。</div><div class="time">12:24</div></div></div></div>
    </div>
  </div>
</body>
</html>
