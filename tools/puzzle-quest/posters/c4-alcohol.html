<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:#2a2723;}
  .stage{width:900px;height:1180px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 40% 30%,#45403a,#221f1b 80%);perspective:2400px;font-family:"Noto Serif CJK TC","Noto Sans CJK TC",serif;}
  .doc{position:relative;width:660px;min-height:840px;padding:48px 50px 44px;background:#fdfdfb;color:#1a1a1a;transform:rotateX(3deg) rotateZ(1deg) rotateY(-1deg);box-shadow:0 4px 8px rgba(0,0,0,.35),0 30px 60px rgba(0,0,0,.6);}
  .doc::before{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(120deg,rgba(255,255,255,.5),transparent 25%,transparent 75%,rgba(60,55,45,.14));mix-blend-mode:soft-light;}
  .co{text-align:center;font-size:23px;font-weight:900;letter-spacing:2px;color:#173a5a;}
  .co small{display:block;font-size:13px;letter-spacing:3px;color:#6a6155;font-weight:400;}
  .ttl{text-align:center;font-size:20px;letter-spacing:4px;margin:6px 0 6px;border-bottom:3px double #111;padding-bottom:10px;}
  .no{text-align:right;font-size:13px;color:#555;margin:6px 0 14px;}
  table{width:100%;border-collapse:collapse;font-size:16px;font-family:"Noto Sans CJK TC";}
  td{border:1px solid #9a9a9a;padding:11px 12px;}
  td.k{background:#eef2f6;font-weight:800;width:42%;}
  .big{font-size:26px;font-weight:900;color:#1c7a3a;font-family:"Noto Sans Mono CJK TC","Noto Sans CJK TC",monospace;}
  .neg{display:inline-block;margin-left:10px;font-size:15px;color:#1c7a3a;border:2px solid #1c7a3a;border-radius:20px;padding:1px 12px;font-weight:800;font-family:"Noto Sans CJK TC";}
  .concl{margin-top:18px;background:#f6f1ea;border-left:4px solid #a01414;padding:12px 16px;font-size:16px;line-height:1.85;font-family:"Noto Sans CJK TC";}
  .concl .em{color:#a01414;font-weight:800;}
  .sign{margin-top:22px;text-align:right;font-size:14px;color:#333;font-family:"Noto Sans CJK TC";}
  .stamp{position:absolute;right:58px;bottom:110px;width:100px;height:100px;border:3px solid rgba(28,90,58,.4);border-radius:50%;color:rgba(28,90,58,.55);display:flex;align-items:center;justify-content:center;text-align:center;font-size:14px;font-weight:900;line-height:1.3;transform:rotate(-10deg);}
  .vig{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at center,transparent 45%,rgba(10,8,4,.55));}
</style></head>
<body>
  <div class="stage">
    <div class="doc">
      <div class="co">城中市政府警察局 刑事鑑識中心<small>FORENSIC SCIENCE CENTER</small></div>
      <div class="ttl">血 中 酒 精 濃 度 檢 驗 報 告</div>
      <div class="no">送驗編號：CC-114-TOX-0512　檢驗日：114/05/09</div>
      <table>
        <tr><td class="k">受檢人</td><td>許博鈞（歿）</td></tr>
        <tr><td class="k">檢體種類</td><td>心臟血（相驗採檢）</td></tr>
        <tr><td class="k">檢驗方法</td><td>氣相層析儀（GC-FID）</td></tr>
        <tr><td class="k">血中酒精濃度</td><td><span class="big">0.00 mg/L</span><span class="neg">陰性</span></td></tr>
        <tr><td class="k">其他常見藥毒物初篩</td><td>未檢出</td></tr>
      </table>
      <div class="concl">檢驗結果：受檢人血中酒精濃度<span class="em">為 0.00、呈陰性</span>，體內未檢出酒精成分。此結果與現場研判之「疑似酒後駕駛」及車內遺留酒瓶<span class="em">明顯矛盾</span>。</div>
      <div class="sign">檢驗人　林筱盈（鑑識技正）<br>覆核　城中市刑事鑑識中心</div>
      <div class="stamp">鑑識中心<br>檢驗合格</div>
    </div>
    <div class="vig"></div>
  </div>
</body>
</html>
