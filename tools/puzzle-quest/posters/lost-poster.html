<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="utf-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { background:#231f1a; }
  .stage{ width:900px; height:1220px; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; background:#231f1a; perspective:2200px; font-family:"Noto Serif CJK TC","Noto Sans CJK TC",serif; }
  .bg{ position:absolute; inset:-40px; background:#2f2c28 url('bg_corkboard.png') center/cover no-repeat; filter:blur(2.5px) brightness(.82) saturate(.9); }
  .flyer{ position:relative; width:620px; padding:52px 48px 44px; background:#efe7d4 url('paper_aged.png') center/cover; color:#211d15; transform:rotateX(3deg) rotateZ(1.3deg) rotateY(1.5deg); box-shadow:0 2px 4px rgba(0,0,0,.4), 0 26px 55px rgba(0,0,0,.62), 0 60px 90px rgba(0,0,0,.4); display:flex; flex-direction:column; }
  .flyer::before{ content:""; position:absolute; inset:0; pointer-events:none; z-index:2; background:linear-gradient(115deg, rgba(255,250,235,.32) 0%, transparent 30%, transparent 70%, rgba(60,45,20,.22) 100%); mix-blend-mode:soft-light; }
  .flyer > *{ position:relative; z-index:1; }
  .tape{ position:absolute; width:150px; height:42px; z-index:3; background:linear-gradient(180deg, rgba(222,214,180,.6), rgba(200,190,150,.48)); box-shadow:0 3px 7px rgba(0,0,0,.35); }
  .tape.tl{ top:-15px; left:48px; transform:rotate(-22deg); } .tape.tr{ top:-15px; right:48px; transform:rotate(20deg); }
  .kicker{ text-align:center; letter-spacing:8px; font-size:15px; color:#6e5326; margin-bottom:6px; }
  .title{ text-align:center; font-weight:900; font-size:48px; letter-spacing:8px; color:#161310; text-shadow:0 1px 0 rgba(255,255,255,.22); }
  .hr{ height:3px; background:#211d15; margin:16px 4px 22px; opacity:.85; }
  .body{ font-size:21px; line-height:2.1; color:#2a2419; }
  .body p{ margin-bottom:14px; }
  .em{ color:#7a2618; font-weight:800; }
  .sign{ text-align:right; margin-top:20px; font-size:19px; color:#3a352c; }
  .light{ position:absolute; inset:0; pointer-events:none; background:radial-gradient(ellipse at 64% 8%, rgba(255,244,220,.15), transparent 55%); }
  .vignette{ position:absolute; inset:0; pointer-events:none; background:radial-gradient(ellipse at center, transparent 42%, rgba(15,10,4,.62) 100%); }
  .grain{ position:absolute; inset:0; pointer-events:none; opacity:.14; mix-blend-mode:overlay; }
</style></head>
<body>
  <div class="stage">
    <div class="bg"></div>
    <div class="flyer">
      <div class="tape tl"></div><div class="tape tr"></div>
      <div class="kicker">河 堤 入 口 · 敬 請 協 尋 失 主</div>
      <div class="title">失 物 招 領</div>
      <div class="hr"></div>
      <div class="body">
        <p>本人昨日下午於河堤邊拾獲藍色書包一只，內有課本與一個<span class="em">粉紅色水壺袋</span>。</p>
        <p>書包主人請儘速與我聯繫領回，我會在原地等你。孩子一定很著急，我懂。</p>
        <p>我每天下午都會在河堤那棵大樹下，帶著它等。</p>
        <p><span class="em">請直接來找我，不必先打電話，來就好。</span></p>
      </div>
      <div class="sign">——一位好心的陌生人　敬上</div>
    </div>
    <div class="light"></div><div class="vignette"></div>
    <svg class="grain" width="900" height="1220"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter><rect width="100%" height="100%" filter="url(#n)"/></svg>
  </div>
</body></html>
