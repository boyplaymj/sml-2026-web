<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:#2a2723;}
  .stage{width:900px;height:1180px;position:relative;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 42% 28%,#46413a,#221f1b 82%);perspective:2200px;font-family:"Noto Sans CJK TC",sans-serif;}
  .doc{position:relative;width:680px;min-height:880px;padding:44px 48px;background:#fefefc;color:#1a1a1a;transform:rotateX(3deg) rotateZ(-1deg) rotateY(1deg);box-shadow:0 4px 8px rgba(0,0,0,.35),0 30px 62px rgba(0,0,0,.6);}
  .doc::before{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(120deg,rgba(255,255,255,.5),transparent 26%,transparent 76%,rgba(60,55,45,.13));mix-blend-mode:soft-light;}
  .hdr{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid #17130d;padding-bottom:10px;}
  .co{font-size:23px;font-weight:900;}.co small{display:block;font-size:12px;color:#6a6155;font-weight:400;}
  .ttl{font-size:24px;font-weight:800;letter-spacing:8px;color:#17130d;}
  .meta{display:flex;justify-content:space-between;font-size:14px;color:#444;margin-top:10px;}
  .meta .em{font-weight:800;color:#a01414;}
  table{width:100%;border-collapse:collapse;margin-top:16px;font-size:15px;}
  th,td{border:1px solid #b8b0a0;padding:9px 10px;text-align:left;}
  th{background:#eef0ee;font-weight:800;}
  .bat{font-weight:900;letter-spacing:1px;}
  .r{text-align:right;}
  .foot{margin-top:20px;display:flex;justify-content:space-between;font-size:15px;line-height:1.9;}
  .barcode{height:44px;margin-top:16px;background:repeating-linear-gradient(90deg,#111 0,#111 2px,#fff 2px,#fff 5px,#111 5px,#111 6px,#fff 6px,#fff 9px);}
  .stamp{position:absolute;right:56px;bottom:120px;width:120px;height:120px;border:4px solid rgba(30,90,60,.5);border-radius:8px;color:rgba(30,90,60,.6);display:flex;align-items:center;justify-content:center;text-align:center;font-size:16px;font-weight:900;line-height:1.3;transform:rotate(-8deg);}
  .vig{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at center,transparent 46%,rgba(10,8,4,.5));}
</style></head>
<body>
  <div class="stage">
    <div class="doc">
      <div class="hdr"><div class="co">昇曜生技股份有限公司<small>生產部 · 物流出貨</small></div><div class="ttl">出 貨 單</div></div>
      <div class="meta"><span>單號：SO-0619-0774</span><span><span class="em">出貨日期：6/19（星期四）</span></span></div>
      <table>
        <tr><th>產品名稱</th><th>批號</th><th>數量</th><th>目的通路</th></tr>
        <tr><td>元氣飲 提神保健飲品 24入</td><td class="bat">A-1128</td><td class="r">3,600 箱</td><td>全通路鋪貨</td></tr>
        <tr><td colspan="4" style="font-size:13px;color:#666;">＊使用原料批 A-1128（麥芽糊精）；放行依據：品保放行單 QA-0618-A1128（特採放行）</td></tr>
      </table>
      <div class="foot">
        <div>製單：物流課 阿昌<br>核發：生產部</div>
        <div class="r">已放行 ✓　已出貨 ✓<br>簽收：各區經銷</div>
      </div>
      <div class="barcode"></div>
      <div class="stamp">昇曜<br>出貨<br>專用章</div>
    </div>
    <div class="vig"></div>
  </div>
</body>
</html>
