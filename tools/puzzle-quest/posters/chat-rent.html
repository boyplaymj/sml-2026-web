<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:"Noto Sans CJK TC",sans-serif;}
  .phone{ width:720px; height:1480px; background:#b3c9e0; position:relative; display:flex; flex-direction:column; }
  .status{ height:44px; background:#7a95b8; display:flex; align-items:center; justify-content:space-between; padding:0 26px; color:#fff; font-size:22px; font-weight:600; }
  .head{ height:74px; background:#6f8bad; display:flex; align-items:center; padding:0 20px; color:#fff; gap:14px; }
  .head .name{ font-size:26px; font-weight:700; flex:1; }
  .head .name small{ display:block; font-size:15px; font-weight:400; opacity:.8; }
  .head .ic{ font-size:26px; opacity:.9; }
  .msgs{ flex:1; padding:22px 22px 30px; display:flex; flex-direction:column; gap:14px; overflow:hidden; }
  .day{ align-self:center; background:rgba(0,0,0,.28); color:#fff; font-size:16px; padding:5px 16px; border-radius:14px; margin:4px 0; }
  .row{ display:flex; align-items:flex-end; gap:8px; max-width:82%; }
  .row.me{ align-self:flex-end; flex-direction:row-reverse; }
  .bubble{ padding:13px 17px; font-size:22px; line-height:1.45; border-radius:20px; }
  .them .bubble{ background:#fff; color:#1a1a1a; border-top-left-radius:6px; }
  .me .bubble{ background:#8de05a; color:#12300a; border-top-right-radius:6px; }
  .time{ font-size:14px; color:#4a5a70; margin:0 2px 2px; white-space:nowrap; }
  .me .time{ color:#41633a; }
  .read{ font-size:13px; color:#5a6b82; }
  .av{ width:44px; height:44px; border-radius:50%; background:#cdd8e6; flex:none; display:flex; align-items:center; justify-content:center; font-size:20px; color:#6f8bad; }
</style>
</head>
<body>
  <div class="phone">
    <div class="status"><div>16:07</div><div>📶 5G 🔋61%</div></div>
    <div class="head"><div class="av">婷</div><div class="name">婷婷<small>最後上線 16:05</small></div><div class="ic">☰</div></div>
    <div class="msgs">
      <div class="day">今天</div>
      <div class="row me"><div class="time">15:52</div><div class="bubble">我剛打了那個超便宜的租屋電話 忘川路那間</div></div>
      <div class="row them"><div class="av">婷</div><div class="bubble">怎樣？有約看房嗎</div><div class="time">15:53</div></div>
      <div class="row me"><div class="time">15:55</div><div class="bubble">接電話的是個女生 聲音很小很小</div></div>
      <div class="row me"><div class="time">15:55</div><div class="bubble">她沒問我要不要看房 一直反問我「你是不是來找我的」</div></div>
      <div class="row them"><div class="av">婷</div><div class="bubble">蛤？什麼意思</div><div class="time">15:56</div></div>
      <div class="row me"><div class="time">15:58</div><div class="bubble">我說我要租房 她突然說「你終於肯上來了嗎」</div></div>
      <div class="row me"><div class="time">15:58</div><div class="bubble">然後就一直哭 一直哭 我整個頭皮發麻直接掛了</div></div>
      <div class="row them"><div class="av">婷</div><div class="bubble">也太毛…那間房該不會出過事吧</div><div class="time">16:00</div></div>
      <div class="row me"><div class="time">16:05</div><div class="bubble">我來查查看忘川路三巷七號那個頂加…<br>等等回你<span class="read"> 已讀</span></div></div>
    </div>
  </div>
</body>
</html>
