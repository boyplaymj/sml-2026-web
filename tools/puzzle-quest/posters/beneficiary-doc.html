<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:#2a2723;}
  .stage{width:900px;height:1220px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#2a2723;perspective:2400px;font-family:"Noto Serif CJK TC","Noto Sans CJK TC",serif;}
  .desk{position:absolute;inset:0;background:radial-gradient(circle at 40% 30%,#45403a,#221f1b 80%);}
  .doc{position:relative;width:640px;min-height:900px;padding:50px 52px 44px;background:#fdfdfb;color:#1a1a1a;transform:rotateX(4deg) rotateZ(-1.1deg) rotateY(1.4deg);box-shadow:0 4px 8px rgba(0,0,0,.35),0 30px 60px rgba(0,0,0,.6);}
  .doc::before{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(120deg,rgba(255,255,255,.5) 0%,transparent 25%,transparent 75%,rgba(60,55,45,.14) 100%);mix-blend-mode:soft-light;}
  .co{text-align:center;font-size:25px;font-weight:900;letter-spacing:3px;}
  .ttl{text-align:center;font-size:22px;letter-spacing:5px;margin:4px 0 6px;border-bottom:3px double #111;padding-bottom:10px;}
  .no{text-align:right;font-size:13px;color:#555;margin:6px 0 12px;}
  table{width:100%;border-collapse:collapse;font-size:16px;}
  td{border:1px solid #9a9a9a;padding:9px 11px;}
  td.k{background:#eef0f2;font-weight:800;width:34%;white-space:nowrap;}
  .old{color:#666;text-decoration:line-through;}
  .new{color:#b01818;font-weight:800;}
  .note{font-size:13px;color:#666;margin-top:14px;line-height:1.7;}
  .sigbox{margin-top:22px;border:1px solid #9a9a9a;padding:14px 16px;}
  .sigbox .lbl{font-size:14px;color:#555;}
  .sigbox .sig{font-family:"Noto Serif CJK TC",cursive;font-size:34px;margin-top:8px;letter-spacing:6px;color:#1a2a4a;transform:rotate(-3deg);display:inline-block;}
  .sigbox .date{float:right;font-size:15px;margin-top:20px;color:#222;}
  .stamp{position:absolute;right:60px;bottom:120px;width:104px;height:104px;border:3px solid rgba(30,80,150,.5);border-radius:50%;color:rgba(30,80,150,.55);display:flex;align-items:center;justify-content:center;text-align:center;font-size:15px;font-weight:900;line-height:1.3;transform:rotate(-12deg);}
  .vig{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at center,transparent 45%,rgba(10,8,4,.55) 100%);}
  .grain{position:absolute;inset:0;pointer-events:none;opacity:.1;mix-blend-mode:overlay;}
</style></head>
<body>
  <div class="stage">
    <div class="desk"></div>
    <div class="doc">
      <div class="co">城 中 人 壽 保 險 股 份 有 限 公 司</div>
      <div class="ttl">保 單 受 益 人 變 更 申 請 書</div>
      <div class="no">保單號碼：CCL-8842-097　受理編號：CH-106-0311</div>
      <table>
        <tr><td class="k">要保人／被保險人</td><td>林 ○ 川（男 · 76 歲）</td></tr>
        <tr><td class="k">原身故受益人</td><td class="old">林 ○ 芳、林 ○ 安（子女）</td></tr>
        <tr><td class="k">變更後受益人</td><td class="new">王 ○ 蘭（看護 · 與被保險人無親屬關係）</td></tr>
        <tr><td class="k">身故保險金額</td><td>新臺幣 560 萬元</td></tr>
        <tr><td class="k">變更事由</td><td>被保險人自願變更</td></tr>
      </table>
      <div class="sigbox">
        <div class="lbl">被保險人 親筆簽名（確認本人親自辦理）：</div>
        <span class="sig">林○川</span>
        <span class="date">申請日期：一〇六 年 三 月 十 日</span>
      </div>
      <div class="note">※ 本變更經被保險人親自簽名確認，自本公司受理之日起生效。<br>※ 受益人變更後，原受益人之權利即行消滅。</div>
      <div class="stamp">城中人壽<br>保全部<br>受理</div>
    </div>
    <div class="vig"></div>
    <svg class="grain" width="900" height="1220"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter><rect width="100%" height="100%" filter="url(#n)"/></svg>
  </div>
</body></html>
