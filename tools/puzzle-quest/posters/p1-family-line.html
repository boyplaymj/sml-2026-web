<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:"Noto Sans CJK TC",sans-serif;}
  html,body{background:#222;}
  .phone{width:720px;height:1180px;background:#8fb0c9;position:relative;display:flex;flex-direction:column;}
  .status{height:44px;background:#5f82a0;display:flex;align-items:center;justify-content:space-between;padding:0 26px;color:#fff;font-size:22px;font-weight:600;}
  .head{height:80px;background:#557295;display:flex;align-items:center;padding:0 20px;color:#fff;gap:14px;}
  .head .back{font-size:30px;}
  .head .av{width:48px;height:48px;border-radius:50%;background:#cdd8e6;flex:none;display:flex;align-items:center;justify-content:center;font-size:22px;color:#557295;}
  .head .name{font-size:25px;font-weight:700;flex:1;}
  .head .name small{display:block;font-size:15px;font-weight:400;opacity:.85;}
  .head .ic{font-size:26px;opacity:.9;}
  .msgs{flex:1;padding:22px 22px 30px;display:flex;flex-direction:column;gap:14px;overflow:hidden;}
  .day{align-self:center;background:rgba(0,0,0,.26);color:#fff;font-size:16px;padding:5px 16px;border-radius:14px;margin:4px 0;}
  .row{display:flex;align-items:flex-start;gap:9px;max-width:82%;}
  .av2{width:46px;height:46px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-size:19px;color:#fff;}
  .a1{background:#a58bb8;}.a2{background:#7fae7f;}.a3{background:#c8a35a;}
  .col{display:flex;flex-direction:column;gap:3px;}
  .who{font-size:15px;color:#2c3a4e;margin-left:4px;}
  .line{display:flex;align-items:flex-end;gap:8px;}
  .bubble{padding:13px 17px;font-size:22px;line-height:1.5;border-radius:20px;background:#fff;color:#1a1a1a;border-top-left-radius:6px;}
  .time{font-size:14px;color:#334;white-space:nowrap;}
</style></head>
<body>
  <div class="phone">
    <div class="status"><div>20:36</div><div style="display:flex;align-items:center;gap:7px;font-size:20px;"><svg width="24" height="18" viewBox="0 0 24 18" fill="#fff"><path d="M12 4C7.5 4 3.7 6.4 1.5 9.2L12 17 22.5 9.2C20.3 6.4 16.5 4 12 4z"/></svg><span>5G</span><span style="display:inline-block;width:30px;height:15px;border:2px solid #fff;border-radius:3px;position:relative;"><span style="position:absolute;right:-4px;top:4px;width:3px;height:5px;background:#fff;"></span><span style="display:block;height:100%;width:55%;background:#fff;"></span></span></div></div>
    <div class="head">
      <div class="back">‹</div>
      <div class="av">家</div>
      <div class="name">士豪的家人朋友<small>成員 12 人</small></div>
      <div class="ic"><svg width="26" height="26" viewBox="0 0 24 24" stroke="#fff" stroke-width="2.2" fill="none"><path d="M3 6h18M3 12h18M3 18h18"/></svg></div>
    </div>
    <div class="msgs">
      <div class="day">6月13日 星期五</div>

      <div class="row"><div class="av2 a1">姨</div><div class="col"><div class="who">秀蘭阿姨</div>
        <div class="line"><div class="bubble">怎麼會這樣…上禮拜還好好的</div><div class="time">19:42</div></div>
      </div></div>

      <div class="row"><div class="av2 a2">誠</div><div class="col"><div class="who">阿誠</div>
        <div class="line"><div class="bubble">他最近不是一直說頭暈想吐嗎，還以為是血壓高…唉</div><div class="time">19:47</div></div>
      </div></div>

      <div class="row"><div class="av2 a1">姨</div><div class="col"><div class="who">秀蘭阿姨</div>
        <div class="line"><div class="bubble">對啊看了好幾次醫生都說沒事…</div><div class="time">19:51</div></div>
      </div></div>

      <div class="row"><div class="av2 a3">賢</div><div class="col"><div class="who">阿賢</div>
        <div class="line"><div class="bubble">話說…那天我看到怡君發了則限動，怪怪的，隔天就刪了，我還截圖…</div><div class="time">20:08</div></div>
      </div></div>

      <div class="row"><div class="av2 a1">姨</div><div class="col"><div class="who">秀蘭阿姨</div>
        <div class="line"><div class="bubble">別亂傳啦，人都走了</div><div class="time">20:11</div></div>
      </div></div>
    </div>
  </div>
</body>
</html>
