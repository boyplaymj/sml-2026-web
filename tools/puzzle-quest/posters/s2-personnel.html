<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:#2a2723;}
  .stage{width:900px;height:1180px;position:relative;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 42% 28%,#46413a,#221f1b 82%);perspective:2200px;font-family:"Noto Serif CJK TC","Noto Sans CJK TC",serif;}
  .doc{position:relative;width:660px;min-height:900px;padding:52px 56px;background:#fdfcf8;color:#1a1a1a;transform:rotateX(3deg) rotateZ(-1deg) rotateY(1.2deg);box-shadow:0 4px 8px rgba(0,0,0,.35),0 30px 62px rgba(0,0,0,.6);}
  .doc::before{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(120deg,rgba(255,255,255,.5),transparent 26%,transparent 76%,rgba(60,55,45,.13));mix-blend-mode:soft-light;}
  .co{text-align:center;font-size:26px;font-weight:900;letter-spacing:3px;}
  .co small{display:block;font-size:14px;font-weight:400;color:#6a6155;letter-spacing:4px;margin-top:2px;}
  .doctype{text-align:center;font-size:22px;letter-spacing:10px;margin:16px 0 6px;font-weight:800;}
  .no{display:flex;justify-content:space-between;font-size:14px;color:#6a6155;border-bottom:2px solid #17130d;padding-bottom:8px;}
  .body{font-size:18px;line-height:2.1;margin-top:20px;text-align:justify;font-family:"Noto Sans CJK TC";}
  .body .big{font-size:20px;font-weight:800;}
  .hl{background:#fff2b0;font-weight:800;padding:0 3px;}
  .list{margin:14px 0 0 6px;font-size:17px;line-height:2.1;}
  .list .k{font-weight:800;margin-right:8px;}
  .sigwrap{display:flex;justify-content:flex-end;gap:40px;margin-top:46px;}
  .sigbox{text-align:center;}
  .sigbox .lbl{font-size:14px;color:#555;font-family:"Noto Sans CJK TC";}
  .sig{font-size:30px;color:#1c3a8a;transform:rotate(-4deg) skewX(-8deg);margin-top:10px;letter-spacing:2px;}
  .date{text-align:right;font-size:16px;margin-top:30px;font-family:"Noto Sans CJK TC";}
  .stamp{position:absolute;left:70px;bottom:120px;width:120px;height:120px;border:4px solid rgba(170,25,25,.45);border-radius:50%;color:rgba(170,25,25,.55);display:flex;align-items:center;justify-content:center;text-align:center;font-size:16px;font-weight:900;line-height:1.3;transform:rotate(-12deg);}
  .vig{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at center,transparent 46%,rgba(10,8,4,.5));}
</style></head>
<body>
  <div class="stage">
    <div class="doc">
      <div class="co">昇曜生技股份有限公司<small>人 事 命 令</small></div>
      <div class="doctype">人 事 異 動 公 告</div>
      <div class="no"><span>人字第 06-208 號</span><span>發布日：6 月 20 日（星期五）</span></div>
      <div class="body">
        茲因品保課課長 <b>周孟樺</b> 女士 <span class="hl">因故出缺</span>，為維持品保業務運作，
        派任副課長 <b class="big">陳志偉</b> 君 <span class="hl">自 6 月 20 日起 代理品保課課長職務</span>，
        綜理品保課各項檢驗放行事宜，希共同砥礪，用示激勵。
      </div>
      <div class="list">
        <div><span class="k">異動人員：</span>陳志偉（原品保課 副課長）</div>
        <div><span class="k">新任職務：</span>品保課 代理課長</div>
        <div><span class="k">生效日期：</span>6 月 20 日</div>
      </div>
      <div class="sigwrap">
        <div class="sigbox"><div class="lbl">核定　總經理</div><div class="sig" style="color:#333;">（核定）</div></div>
        <div class="sigbox"><div class="lbl">領受人簽章</div><div class="sig">陳志偉</div></div>
      </div>
      <div class="date">中　華　民　國　6　月　20　日</div>
      <div class="stamp">昇曜<br>人事<br>發令章</div>
    </div>
    <div class="vig"></div>
  </div>
</body>
</html>
