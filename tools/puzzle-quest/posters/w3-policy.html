<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:#2a2723;}
  .stage{width:900px;height:1180px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 40% 30%,#45403a,#221f1b 80%);perspective:2400px;font-family:"Noto Serif CJK TC","Noto Sans CJK TC",serif;}
  .doc{position:relative;width:660px;min-height:900px;padding:48px 50px 44px;background:#fdfdfb;color:#1a1a1a;transform:rotateX(4deg) rotateZ(-1deg) rotateY(1.2deg);box-shadow:0 4px 8px rgba(0,0,0,.35),0 30px 60px rgba(0,0,0,.6);}
  .doc::before{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(120deg,rgba(255,255,255,.5),transparent 25%,transparent 75%,rgba(60,55,45,.14));mix-blend-mode:soft-light;}
  .co{text-align:center;font-size:25px;font-weight:900;letter-spacing:3px;color:#173a5a;}
  .ttl{text-align:center;font-size:21px;letter-spacing:5px;margin:4px 0 6px;border-bottom:3px double #111;padding-bottom:10px;}
  .no{text-align:right;font-size:13px;color:#555;margin:6px 0 12px;}
  table{width:100%;border-collapse:collapse;font-size:16px;}
  td{border:1px solid #9a9a9a;padding:10px 12px;}
  td.k{background:#eef2f6;font-weight:800;width:34%;white-space:nowrap;}
  .red{color:#b01818;font-weight:800;}
  .note{font-size:13px;color:#666;margin-top:14px;line-height:1.7;}
  .stamp{position:absolute;right:60px;bottom:120px;width:108px;height:108px;border:3px solid rgba(23,58,90,.45);border-radius:50%;color:rgba(23,58,90,.5);display:flex;align-items:center;justify-content:center;text-align:center;font-size:15px;font-weight:900;line-height:1.3;transform:rotate(-12deg);}
  .vig{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at center,transparent 45%,rgba(10,8,4,.55));}
</style></head>
<body>
  <div class="stage">
    <div class="doc">
      <div class="co">城 中 人 壽 保 險 股 份 有 限 公 司</div>
      <div class="ttl">保 單 資 料 查 詢 表</div>
      <div class="no">保單號碼：CCL-7731-208　列印日：114/03/09</div>
      <table>
        <tr><td class="k">要保人</td><td>林昱翔（男 · 29 歲）</td></tr>
        <tr><td class="k">被保險人</td><td>林昱翔（同要保人）</td></tr>
        <tr><td class="k">投保險種</td><td>康泰終身壽險　＋　意外身故給付附約</td></tr>
        <tr><td class="k">身故保險金額</td><td class="red">新臺幣 2,000 萬元</td></tr>
        <tr><td class="k">投保日期</td><td class="red">114 年 2 月 10 日（近期投保）</td></tr>
        <tr><td class="k">繳別／保費</td><td>月繳　·　自要保人帳戶自動扣款</td></tr>
        <tr><td class="k">保單狀態</td><td>有效（等待期已過）</td></tr>
        <tr><td class="k">身故受益人</td><td class="red">＊近期經申請變更（詳見受益人變更申請書）</td></tr>
      </table>
      <div class="note">※ 本表僅供保戶資料查詢，不作為理賠依據。<br>※ 投保未滿一年之身故理賠，本公司得依規定調查事故原因與投保過程。</div>
      <div class="stamp">城中人壽<br>保戶服務<br>查詢章</div>
    </div>
    <div class="vig"></div>
  </div>
</body>
</html>
