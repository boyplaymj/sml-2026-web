<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:"Noto Sans CJK TC",sans-serif;}
  .phone{ width:720px; height:1480px; background:#1f2733; position:relative; display:flex; flex-direction:column; }
  .status{ height:44px; background:#161c26; display:flex; align-items:center; justify-content:space-between; padding:0 26px; color:#dfe6ee; font-size:22px; font-weight:600; }
  .head{ height:74px; background:#243040; display:flex; align-items:center; padding:0 20px; color:#fff; gap:14px; }
  .head .name{ font-size:24px; font-weight:700; flex:1; } .head .name small{ display:block; font-size:15px; font-weight:400; opacity:.6; }
  .head .ic{ font-size:26px; opacity:.8; }
  .msgs{ flex:1; padding:20px 20px 30px; display:flex; flex-direction:column; gap:12px; overflow:hidden; }
  .day{ align-self:center; background:rgba(255,255,255,.14); color:#cfd6de; font-size:16px; padding:5px 16px; border-radius:14px; margin:4px 0; }
  .row{ display:flex; align-items:flex-end; gap:8px; max-width:84%; }
  .row.me{ align-self:flex-end; flex-direction:row-reverse; }
  .bubble{ padding:12px 16px; font-size:21px; line-height:1.45; border-radius:18px; }
  .them .bubble{ background:#2f3b4b; color:#e6ebf1; border-top-left-radius:6px; }
  .me .bubble{ background:#2b6cb0; color:#fff; border-top-right-radius:6px; }
  .time{ font-size:13px; color:#7f8b99; margin:0 2px 2px; white-space:nowrap; }
  .av{ width:44px; height:44px; border-radius:50%; background:#3a4757; flex:none; display:flex; align-items:center; justify-content:center; font-size:20px; color:#cbd5e0; }
</style></head>
<body>
  <div class="phone">
    <div class="status"><div>02:18</div><div>📶 4G 🔋33%</div></div>
    <div class="head"><div class="av">?</div><div class="name">未命名聯絡人<small>已封存</small></div><div class="ic">☰</div></div>
    <div class="msgs">
      <div class="day">事故後三日</div>
      <div class="row me"><div class="time">02:01</div><div class="bubble">東西都處理好了？</div></div>
      <div class="row them"><div class="av">L</div><div class="bubble">嗯 現場弄得像自撞 車速、煞車痕都對得起來 沒人會多看</div><div class="time">02:03</div></div>
      <div class="row me"><div class="time">02:05</div><div class="bubble">保險金下來 照講好的分 別亂來</div></div>
      <div class="row them"><div class="av">L</div><div class="bubble">他老婆那邊沒問題吧 她可是拿最大一份</div><div class="time">02:06</div></div>
      <div class="row me"><div class="time">02:08</div><div class="bubble">她比誰都不會說。倒是那個保險業務員 好像在查加保的事</div></div>
      <div class="row them"><div class="av">L</div><div class="bubble">兩個月前就加保了 手續齊全 死無對證 你別自己嚇自己</div><div class="time">02:10</div></div>
      <div class="row me"><div class="time">02:12</div><div class="bubble">相驗那關過了就沒事…安眠藥的劑量他們驗得出來嗎</div></div>
      <div class="row them"><div class="av">L</div><div class="bubble">別再傳這些了 講好事成之後 這個號碼就丟</div><div class="time">02:13</div></div>
    </div>
  </div>
</body></html>
