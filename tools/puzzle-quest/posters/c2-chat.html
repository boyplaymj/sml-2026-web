<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:"Noto Sans CJK TC",sans-serif;}
  html,body{background:#222;}
  .phone{width:720px;height:1180px;background:#a9c3d6;position:relative;display:flex;flex-direction:column;}
  .status{height:44px;background:#7d9bb3;display:flex;align-items:center;justify-content:space-between;padding:0 26px;color:#fff;font-size:22px;font-weight:600;}
  .head{height:80px;background:#6f8fa9;display:flex;align-items:center;padding:0 20px;color:#fff;gap:14px;}
  .head .back{font-size:30px;}
  .head .av{width:48px;height:48px;border-radius:50%;background:#b56d84;flex:none;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;}
  .head .name{font-size:25px;font-weight:700;flex:1;}
  .head .name small{display:block;font-size:15px;font-weight:400;opacity:.85;}
  .head .ic{font-size:26px;opacity:.9;}
  .msgs{flex:1;padding:22px 22px 30px;display:flex;flex-direction:column;gap:14px;overflow:hidden;}
  .day{align-self:center;background:rgba(0,0,0,.24);color:#fff;font-size:16px;padding:5px 16px;border-radius:14px;margin:4px 0;}
  .row{display:flex;align-items:flex-start;gap:9px;max-width:80%;}
  .row.me{align-self:flex-end;flex-direction:row-reverse;}
  .col{display:flex;flex-direction:column;gap:3px;}
  .line{display:flex;align-items:flex-end;gap:8px;}
  .row.me .line{flex-direction:row-reverse;}
  .bubble{padding:13px 17px;font-size:22px;line-height:1.5;border-radius:20px;}
  .them .bubble{background:#fff;color:#1a1a1a;border-top-left-radius:6px;}
  .me .bubble{background:#8de05a;color:#12300a;border-top-right-radius:6px;}
  .time{font-size:14px;color:#33445a;white-space:nowrap;}
</style></head>
<body>
  <div class="phone">
    <div class="status"><div>23:41</div><div style="display:flex;align-items:center;gap:7px;font-size:20px;"><svg width="24" height="18" viewBox="0 0 24 18" fill="#fff"><path d="M12 4C7.5 4 3.7 6.4 1.5 9.2L12 17 22.5 9.2C20.3 6.4 16.5 4 12 4z"/></svg><span>5G</span><span style="display:inline-block;width:30px;height:15px;border:2px solid #fff;border-radius:3px;position:relative;"><span style="position:absolute;right:-4px;top:4px;width:3px;height:5px;background:#fff;"></span><span style="display:block;height:100%;width:62%;background:#fff;"></span></span></div></div>
    <div class="head">
      <div class="back">‹</div>
      <div class="av">蓉</div>
      <div class="name">映蓉<small>上次上線 昨天</small></div>
      <div class="ic">☰</div>
    </div>
    <div class="msgs">
      <div class="day">4月26日 星期六</div>

      <div class="row them"><div class="col"><div class="line"><div class="bubble">你今天又要跑到幾點</div><div class="time">22:50</div></div></div></div>
      <div class="row me"><div class="col"><div class="line"><div class="time">22:58</div><div class="bubble">就客戶啊 不然這個家的開銷從哪來</div></div></div></div>
      <div class="row them"><div class="col">
        <div class="line"><div class="bubble">錢錢錢 你有沒有一天是真的在這個家的</div><div class="time">23:02</div></div>
        <div class="line"><div class="bubble">我跟你講話你都在忙</div><div class="time">23:02</div></div>
      </div></div>
      <div class="row me"><div class="col"><div class="line"><div class="time">23:10</div><div class="bubble">我不就是為了這個家在拼？你到底要我怎樣</div></div></div></div>
      <div class="row them"><div class="col"><div class="line"><div class="bubble">…算了 隨便你</div><div class="time">23:20</div></div></div></div>
      <div class="row me"><div class="col"><div class="line"><div class="time">23:38</div><div class="bubble">映蓉，我們好好談一次好不好</div></div></div></div>
      <div class="row them"><div class="col"><div class="line"><div class="bubble">（已讀）</div><div class="time">23:39</div></div></div></div>
    </div>
  </div>
</body>
</html>
