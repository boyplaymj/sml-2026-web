<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{background:#2a2723;}
  .stage{width:900px;height:1180px;position:relative;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 42% 28%,#46413a,#221f1b 82%);perspective:2200px;font-family:"Noto Sans CJK TC",sans-serif;}
  .doc{position:relative;width:670px;min-height:900px;padding:46px 48px;background:#fdfdfb;color:#1a1a1a;transform:rotateX(3deg) rotateZ(-1deg) rotateY(1deg);box-shadow:0 4px 8px rgba(0,0,0,.35),0 30px 62px rgba(0,0,0,.6);}
  .doc::before{content:"";position:absolute;inset:0;pointer-events:none;background:linear-gradient(120deg,rgba(255,255,255,.5),transparent 26%,transparent 76%,rgba(60,55,45,.13));mix-blend-mode:soft-light;}
  .hdr{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid #17130d;padding-bottom:10px;}
  .hdr .co{font-size:24px;font-weight:900;letter-spacing:2px;}
  .hdr .co small{display:block;font-size:13px;font-weight:400;color:#6a6155;letter-spacing:2px;}
  .hdr .ttl{font-size:22px;font-weight:800;letter-spacing:6px;}
  .meta{display:flex;justify-content:space-between;font-size:14px;color:#555;margin-top:10px;}
  table{width:100%;border-collapse:collapse;margin-top:16px;font-size:16px;}
  td{border:1px solid #b8b0a0;padding:10px 12px;line-height:1.6;}
  td.k{background:#f2efe6;font-weight:800;width:150px;white-space:nowrap;}
  .bat{font-weight:900;letter-spacing:1px;}
  .res{font-size:16px;line-height:2;margin-top:16px;}
  .chk{display:inline-block;width:16px;height:16px;border:2px solid #333;margin-right:6px;vertical-align:-2px;position:relative;}
  .chk.on::after{content:"✓";position:absolute;left:1px;top:-4px;font-size:16px;font-weight:900;color:#111;}
  .sigrow{display:flex;justify-content:space-between;margin-top:40px;}
  .sigbox{width:44%;}
  .sigbox .lbl{font-size:14px;color:#555;border-bottom:1px solid #999;padding-bottom:4px;}
  .sig{font-family:"Noto Serif CJK TC",serif;font-size:30px;color:#1c3a8a;transform:rotate(-4deg) skewX(-8deg);margin:12px 0 0 8px;letter-spacing:2px;}
  .sig .d{display:block;font-size:14px;color:#333;transform:none;margin-top:6px;font-family:"Noto Sans CJK TC";letter-spacing:0;}
  .stamp{position:absolute;right:60px;bottom:120px;width:118px;height:118px;border:4px solid rgba(170,25,25,.5);border-radius:50%;color:rgba(170,25,25,.6);display:flex;align-items:center;justify-content:center;text-align:center;font-size:16px;font-weight:900;line-height:1.3;transform:rotate(-10deg);}
  .vig{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at center,transparent 46%,rgba(10,8,4,.5));}
</style></head>
<body>
  <div class="stage">
    <div class="doc">
      <div class="hdr"><div class="co">昇曜生技股份有限公司<small>品質保證部</small></div><div class="ttl">品保放行單</div></div>
      <div class="meta"><span>單號：QA-0618-A1128</span><span>列印日：6/18</span></div>
      <table>
        <tr><td class="k">原料品名</td><td>麥芽糊精（食品級）</td><td class="k">批號</td><td class="bat">A-1128</td></tr>
        <tr><td class="k">供應商</td><td>宏茂原料</td><td class="k">數量</td><td>1,200 kg</td></tr>
        <tr><td class="k">檢驗單號</td><td colspan="3">QC-0612-338（重金屬／砷 項目：詳附件）</td></tr>
      </table>
      <div class="res">
        判定：
        <label><span class="chk"></span>合格放行</label>
        <label><span class="chk on"></span><b>特採放行</b>（限期改善）</label>
        <label><span class="chk"></span>退貨</label>
        <div style="font-size:14px;color:#666;margin-top:6px;">備註：交期緊迫，先行放行後補件。</div>
      </div>
      <div class="sigrow">
        <div class="sigbox"><div class="lbl">品保主管　核准簽章</div><div class="sig">周孟樺<span class="d">簽核日：6/18</span></div></div>
        <div class="sigbox"><div class="lbl">承辦　簽章</div><div class="sig" style="color:#333;font-size:26px;">（承辦）<span class="d">6/18</span></div></div>
      </div>
      <div class="stamp">昇曜<br>品保<br>放行章</div>
    </div>
    <div class="vig"></div>
  </div>
</body>
</html>
