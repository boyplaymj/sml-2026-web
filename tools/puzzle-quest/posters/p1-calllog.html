<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:"Noto Sans CJK TC",sans-serif;}
  html,body{background:#222;}
  .phone{width:720px;height:1180px;background:#f2f2f6;position:relative;display:flex;flex-direction:column;}
  .status{height:44px;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:0 26px;color:#111;font-size:22px;font-weight:600;}
  .head{background:#fff;padding:10px 24px 14px;border-bottom:1px solid #d8d8dc;}
  .head .tabs{display:flex;justify-content:center;margin-bottom:12px;}
  .head .tabs span{font-size:16px;padding:6px 22px;border:1px solid #b9b9c0;color:#555;}
  .head .tabs .on{background:#e4e4ea;color:#111;font-weight:700;}
  .head .tabs span:first-child{border-radius:8px 0 0 8px;}
  .head .tabs span:last-child{border-radius:0 8px 8px 0;border-left:none;}
  .head h1{font-size:36px;font-weight:800;color:#111;letter-spacing:2px;}
  .list{flex:1;background:#fff;overflow:hidden;}
  .sect{padding:14px 24px 8px;font-size:17px;color:#7a7a82;font-weight:600;background:#f2f2f6;border-bottom:1px solid #e2e2e8;letter-spacing:1px;}
  .row{display:flex;align-items:center;gap:16px;padding:20px 24px;border-bottom:1px solid #ececf0;}
  .dir{width:34px;flex:none;display:flex;align-items:center;justify-content:center;}
  .col{flex:1;min-width:0;}
  .nm{font-size:25px;color:#111;font-weight:600;line-height:1.3;}
  .nm.missed{color:#e03a2f;}
  .sub{font-size:16px;color:#8a8a92;margin-top:2px;letter-spacing:1px;}
  .tm{font-size:19px;color:#8a8a92;flex:none;letter-spacing:1px;}
  .info{flex:none;width:32px;height:32px;border:2px solid #3478f6;border-radius:50%;color:#3478f6;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;font-family:Georgia,serif;}
  .homebar{height:34px;background:#fff;display:flex;align-items:center;justify-content:center;}
  .homebar i{width:150px;height:6px;border-radius:3px;background:#c9c9cf;}
</style></head>
<body>
  <div class="phone">
