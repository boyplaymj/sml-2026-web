<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:"Noto Sans CJK TC",sans-serif;}
  html,body{background:#111;}
  .stage{width:760px;background:#e9e6df;color:#1a1a1a;position:relative;overflow:hidden;padding:20px 20px 16px;}
  .bar{display:flex;align-items:center;justify-content:space-between;font-size:15px;color:#3a352c;letter-spacing:1px;padding-bottom:12px;}
  .bar b{font-size:17px;letter-spacing:2px;}
  .photo{width:720px;height:720px;position:relative;background:#0a0d10 url('m1-scene-base.png') center/cover;border:3px solid #1a1a1a;overflow:hidden;filter:contrast(1.03) saturate(.9);}
  .ph-grain{position:absolute;inset:0;pointer-events:none;opacity:.15;mix-blend-mode:overlay;background:repeating-radial-gradient(circle at 40% 30%,#000 0,transparent 2px);}
  .flash{position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 32% 22%,rgba(200,220,255,.12),transparent 55%);}
  .marker{position:absolute;width:50px;height:58px;background:#f6d64a;color:#111;border:2px solid #222;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;transform:perspective(300px) rotateX(38deg);box-shadow:0 6px 10px rgba(0,0,0,.5);}
  .m1{left:30%;top:20%;}
  .m2{left:54%;bottom:16%;}
  .ruler{position:absolute;right:5%;bottom:8%;width:150px;height:15px;background:repeating-linear-gradient(90deg,#f4f0e6,#f4f0e6 14px,#111 14px,#111 28px);border:1px solid #111;opacity:.9;}
  .stamp{position:absolute;right:12px;bottom:10px;font-family:"Courier New",monospace;color:#ff9a3c;font-size:19px;letter-spacing:1px;text-shadow:0 0 3px rgba(0,0,0,.9);}
  .tag{position:absolute;font-size:13px;color:#fff;background:rgba(20,20,20,.72);padding:3px 8px;letter-spacing:1px;border:1px solid rgba(255,255,255,.4);}
  .t1{left:4%;top:12%;}
  .t1::after{content:"";position:absolute;left:100%;top:50%;width:70px;height:1px;background:rgba(255,255,255,.6);}
  .t3{left:3%;top:50%;}
  .t3::after{content:"";position:absolute;left:100%;top:50%;width:64px;height:1px;background:rgba(255,255,255,.6);}
  .t2{right:4%;top:66%;}
  .t2::after{content:"";position:absolute;right:100%;top:50%;width:60px;height:1px;background:rgba(255,255,255,.6);}
  .cap{display:flex;justify-content:space-between;font-size:14px;color:#4a453c;padding-top:10px;letter-spacing:.5px;}
</style></head>
<body>
  <div class="stage">
    <div class="bar"><b>城中市政府警察局・鑑識中心 現場採證</b><span>案件編號 MY-0918-013</span></div>
    <div class="photo">
      <div class="tag t1">金屬檢視燈（老舊）</div>
      <div class="tag t3">畫作・捲收未拆封</div>
      <div class="tag t2">地面積水（反光）</div>
      <div class="marker m1">1</div>
      <div class="marker m2">2</div>
      <div class="ruler"></div>
      <div class="flash"></div>
      <div class="ph-grain"></div>
      <div class="stamp">09/18 09:26</div>
    </div>
    <div class="cap"><span>採證項目：明硯藝廊 修復室現場（鑑定師加班中倒臥工作檯旁）</span><span>攝影：鑑識中心</span></div>
  </div>
</body>
</html>
