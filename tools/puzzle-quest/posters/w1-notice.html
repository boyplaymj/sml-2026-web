<!DOCTYPE html>
<html lang="zh-Hant"><head><meta charset="utf-8">
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:"Noto Sans CJK TC",sans-serif;}
  html,body{background:#2a2723;}
  .stage{width:900px;height:1180px;position:relative;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 44% 26%,#48433b,#221f1b 82%);perspective:2200px;}
  .card{position:relative;width:640px;background:#fffdf7;color:#1a1a1a;transform:rotateX(3deg) rotateZ(-1deg);box-shadow:0 4px 8px rgba(0,0,0,.35),0 30px 62px rgba(0,0,0,.6);overflow:hidden;}
  .banner{background:#c1443a;color:#fff;padding:20px 26px;display:flex;align-items:baseline;justify-content:space-between;}
  .banner .t{font-size:34px;font-weight:900;letter-spacing:4px;}
  .banner .sub{font-size:15px;letter-spacing:2px;opacity:.92;}
  .ph{width:100%;height:250px;background:linear-gradient(160deg,#5c554a,#2c281f);position:relative;filter:grayscale(.25);}
  .ph .room{position:absolute;inset:26px 40px;background:linear-gradient(#726957,#3d3728);opacity:.9;}
  .ph .win{position:absolute;left:80px;top:70px;width:120px;height:96px;background:#20304a;border:6px solid #877c64;}
  .ph .badge{position:absolute;right:16px;bottom:14px;background:rgba(0,0,0,.6);color:#ffe;font-size:13px;padding:5px 10px;letter-spacing:1px;}
  .in{padding:26px 34px 30px;}
  .price{font-size:40px;font-weight:900;color:#c1443a;}
  .price small{font-size:18px;color:#6a6155;font-weight:600;margin-left:8px;}
  .rows{margin-top:16px;font-size:19px;line-height:2.1;}
  .rows .k{display:inline-block;width:96px;color:#6a6155;font-weight:700;}
  .note{margin-top:18px;background:#f5f0e4;border-left:4px solid #c1443a;padding:14px 16px;font-size:16.5px;line-height:1.85;color:#3a352c;}
  .cta{margin-top:22px;display:flex;align-items:center;justify-content:space-between;border-top:1px dashed #ccc4b2;padding-top:16px;font-size:17px;}
  .cta b{font-size:21px;}
  .tagline{position:absolute;left:0;right:0;bottom:0;background:#17130d;color:#cfc7b5;font-size:13px;letter-spacing:2px;text-align:center;padding:8px;}
</style></head>
<body>
  <div class="stage">
    <div class="card">
      <div class="banner"><div class="t">整層套房出租</div><div class="sub">城中・文山路</div></div>
      <div class="ph"><div class="room"></div><div class="win"></div><div class="badge">實景・3樓</div></div>
      <div class="in">
        <div class="price">$8,500<small>／月（含管理費）</small></div>
        <div class="rows">
          <div><span class="k">地　址</span>城中市文山路 ◯◯ 巷（近市場、生活機能佳）</div>
          <div><span class="k">坪　數</span>約 7 坪・獨立衛浴・對外窗</div>
          <div><span class="k">屋　況</span>已徹底清潔淨屋、重新粉刷、可即刻入住</div>
          <div><span class="k">設　備</span>冷氣、熱水器、洗衣機、床架</div>
        </div>
        <div class="note">
          ＊誠實告知：前一位房客於屋內過世，房屋結構與設備均無虞、已完成專業清潔淨屋。介意者請勿約看，房東不再另行說明，敬請見諒。房租已略低於行情。
        </div>
        <div class="cta"><span>意者請洽　房東 陳太太</span><b>0938-◯◯◯-◯◯◯</b></div>
      </div>
      <div class="tagline">城中租屋社團・屋主自租・仲介勿擾</div>
    </div>
  </div>
</body>
</html>
