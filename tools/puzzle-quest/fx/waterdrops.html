<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>水滴特效 demo（CASE-10 氛圍層）</title>
<style>
  html,body{margin:0;height:100%;background:#12151a;overflow:hidden;font-family:system-ui,"Noto Sans TC",sans-serif}
  /* 預覽用的假地板／房間，只為看效果；貼進 wenshan.html 時不需要這塊 */
  .demo-room{position:fixed;inset:0;background:
    linear-gradient(180deg,#1b1f26 0%,#171a20 62%,#0e1013 62.2%,#0b0d10 100%);}
  .demo-room::after{content:"潮濕的套房・天花板在滲水";position:fixed;top:16px;left:50%;
    transform:translateX(-50%);color:#3a4048;font-size:13px;letter-spacing:2px}

  /* ==== 以下 = drop-in 片段（.wq-drips 容器 + style + script）==== */
  .wq-drips{position:fixed;inset:0;pointer-events:none;z-index:40;overflow:hidden}
  .wq-drips .drip{position:absolute;top:-24px;width:3px;height:14px;
    /* 拉長的水滴：上尖下圓 */
    background:linear-gradient(180deg,rgba(150,180,205,0) 0%,rgba(150,180,205,.35) 55%,rgba(175,205,230,.6) 100%);
    border-radius:60% 60% 55% 55% / 90% 90% 40% 40%;
    filter:blur(.2px);
    animation:wq-fall var(--fall,900ms) cubic-bezier(.5,0,.9,.5) forwards}
  @keyframes wq-fall{
    0%{transform:translateY(0) scaleY(.7);opacity:0}
    12%{opacity:.85}
    88%{opacity:.85}
    100%{transform:translateY(var(--drop,60vh)) scaleY(1.15);opacity:.9}}

  /* 落地漣漪：地板是俯視斜角 → 用扁橢圓 */
  .wq-drips .splash{position:absolute;width:22px;height:8px;border-radius:50%;
    border:1px solid rgba(180,205,225,.5);opacity:0;
    animation:wq-ripple 1100ms ease-out forwards}
  @keyframes wq-ripple{
    0%{transform:translate(-50%,-50%) scale(.2);opacity:.55}
    100%{transform:translate(-50%,-50%) scale(1.6);opacity:0;border-color:rgba(180,205,225,0)}}

  /* 濺起的小水花（2~3 顆往上彈再落下）*/
  .wq-drips .fleck{position:absolute;width:2px;height:2px;border-radius:50%;
    background:rgba(190,215,235,.7);opacity:0;
    animation:wq-fleck 650ms ease-out forwards}
  @keyframes wq-fleck{
    0%{transform:translate(-50%,-50%);opacity:.8}
    100%{transform:translate(calc(-50% + var(--fx,6px)),calc(-50% - var(--fy,10px)));opacity:0}}
  /* 地上殘留的小濕痕（緩慢淡出，暗示已經滴很久）*/
  .wq-drips .wet{position:absolute;width:14px;height:5px;border-radius:50%;
    background:radial-gradient(ellipse,rgba(120,150,175,.28),rgba(120,150,175,0) 70%);
    transform:translate(-50%,-50%);opacity:0;animation:wq-wet 4200ms ease-out forwards}
  @keyframes wq-wet{0%{opacity:.5}100%{opacity:0}}

  @media (prefers-reduced-motion: reduce){ .wq-drips{display:none} }
</style>
</head>
<body>
  <div class="demo-room"></div>

  <!-- drop-in：把這個 div 放進頁面 body 尾端即可 -->
  <div class="wq-drips" id="wqDrips" aria-hidden="true"></div>

  <script>
  /* ==== drop-in 片段：稀疏隨機水滴。可調 3 個參數 ==== */
  (function(){
    const layer = document.getElementById('wqDrips');
    if(!layer) return;
    if(matchMedia('(prefers-reduced-motion: reduce)').matches) return;

    const MIN_GAP = 4000;      // 兩滴之間最短間隔(ms)
    const MAX_GAP = 7500;      // 最長間隔(ms) → 平均 ~5.7s 一滴 = 「一點點」
    const FLOOR_TOP = 0.62;    // 地板線位置(視窗高比例)，對齊你頁面的地板；wenshan 可再調
    // 幾個固定「漏水點」+ 微抖動，比全隨機更真實(水總從同幾處滴)
    const LEAKS = [0.28, 0.52, 0.78];

    const rand = (a,b)=> a + Math.random()*(b-a);

    function dropOnce(){
      const leak = LEAKS[(Math.random()*LEAKS.length)|0];
      const x = (leak + rand(-0.04,0.04)) * innerWidth;   // 水平位置
      const floorY = FLOOR_TOP * innerHeight;
      const fallPx = floorY;                               // 從頂端落到地板

      // 1) 落下的水滴
      const drip = document.createElement('div');
      drip.className = 'drip';
      drip.style.left = x + 'px';
      drip.style.setProperty('--drop', fallPx + 'px');
      drip.style.setProperty('--fall', rand(760,1000)|0 + 'ms');
      layer.appendChild(drip);

      // 2) 落地後：漣漪 + 水花 + 濕痕
      const fallMs = 900;
      setTimeout(()=>{
        drip.remove();
        const mk = (cls)=>{ const e=document.createElement('div'); e.className=cls;
          e.style.left=x+'px'; e.style.top=floorY+'px'; layer.appendChild(e);
          e.addEventListener('animationend',()=>e.remove()); return e; };
        mk('splash');
        mk('wet');
        const n = 2 + ((Math.random()*2)|0);              // 2~3 顆水花
        for(let i=0;i<n;i++){ const f=mk('fleck');
          f.style.setProperty('--fx',(rand(-9,9)|0)+'px');
          f.style.setProperty('--fy',(rand(7,14)|0)+'px'); }
      }, fallMs);

      setTimeout(dropOnce, rand(MIN_GAP, MAX_GAP));        // 排下一滴
    }
    setTimeout(dropOnce, rand(800, 2500));                 // 開場稍等再滴
  })();
  </script>
</body>
</html>
