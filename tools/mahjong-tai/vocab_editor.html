<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>🀄 牌型同義詞管理</title>
<style>
  :root { --bg:#0f1420; --card:#1b2333; --line:#2c3853; --txt:#e8edf7; --dim:#8ea0c0;
          --green:#3fb984; --amber:#e0a83b; --red:#e05b5b; --blue:#4a8fe0; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:"Noto Sans TC",system-ui,sans-serif; background:var(--bg); color:var(--txt);
         display:flex; justify-content:center; padding:20px 12px 60px; }
  .wrap { width:100%; max-width:640px; }
  h1 { font-size:20px; margin:0 0 4px; }
  .sub { color:var(--dim); font-size:13px; margin-bottom:16px; line-height:1.6; }
  .bar { position:sticky; top:0; background:var(--bg); padding:8px 0 12px; z-index:5; border-bottom:1px solid var(--line); margin-bottom:14px; }
  .test { display:flex; gap:8px; margin-bottom:8px; }
  .test input { flex:1; background:var(--card); border:1px solid var(--line); color:var(--txt);
                border-radius:10px; padding:11px 12px; font-size:15px; }
  .mic { border:none; border-radius:10px; padding:0 16px; background:var(--blue); color:#fff; font-weight:700; cursor:pointer; }
  .mic.rec { background:var(--red); }
  .testout { font-size:13.5px; min-height:20px; color:var(--dim); }
  .testout b { color:var(--green); }
  .tools { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
  .tools button, .tools label { border:none; border-radius:9px; padding:8px 12px; background:#39445c; color:#fff;
                   font-size:13px; cursor:pointer; }
  .filter { width:100%; margin-top:8px; background:var(--card); border:1px solid var(--line); color:var(--txt);
            border-radius:10px; padding:10px 12px; font-size:14px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:12px 14px; margin-bottom:10px; }
  .card h3 { font-size:16px; margin:0 0 9px; display:flex; align-items:center; gap:8px; }
  .idx { font-size:11px; color:var(--dim); background:#0c1017; border-radius:5px; padding:2px 6px; font-weight:400; }
  .tai { font-size:11px; color:var(--amber); font-weight:400; }
  .chips { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
  .chip { display:flex; align-items:center; gap:5px; background:#233049; border:1px solid var(--line);
          border-radius:16px; padding:5px 6px 5px 11px; font-size:13.5px; }
  .chip.name { background:#26364f; border-color:#3a4d70; font-weight:700; }
  .chip .x { cursor:pointer; color:var(--dim); border:none; background:none; font-size:15px; line-height:1; padding:0 2px; }
  .chip .x:hover { color:var(--red); }
  .addin { background:#0c1017; border:1px dashed var(--line); color:var(--txt); border-radius:16px;
           padding:5px 11px; font-size:13.5px; width:120px; }
  .count { font-size:12px; color:var(--dim); margin-left:auto; font-weight:400; }
  .note { color:var(--dim); font-size:12px; line-height:1.6; margin-top:8px; }
  .empty-syn { color:var(--red); font-size:12px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🀄 牌型同義詞管理</h1>
  <p class="sub">每個牌型填入你會講的<b>同義詞 / 口語 / 常見誤聽</b>。語音辨識到任一個(含同音),就對到那個牌型並回傳它的
     <b>idx</b>(可直接跟後台計分交叉核對)。台數不影響比對。</p>

  <div class="bar">
    <div class="test">
      <input id="testIn" placeholder="測試:打字或按🎤講一句,看對到哪個牌型">
      <button id="mic" class="mic">🎤</button>
    </div>
    <div id="testout" class="testout">　</div>
    <div class="tools">
      <button id="exportBtn">⬇ 匯出 JSON</button>
      <label>⬆ 匯入 JSON<input id="importFile" type="file" accept="application/json" style="display:none"></label>
      <button id="resetBtn">↺ 還原預設</button>
      <span class="count" id="savedNote"></span>
    </div>
    <input id="filter" class="filter" placeholder="🔍 篩選牌型(輸入名稱)">
  </div>

  <div id="list"></div>
  <p class="note">💾 目前存在此瀏覽器(localStorage)。之後要讓手機訓練站共用,再把這份匯出接到 Firestore
     即可(同一份 idx↔同義詞,兩邊共用)。</p>
</div>

<script src="vendor/pinyin-pro.js"></script>
<script src="phonetic.js"></script>
<script>
const $ = s => document.querySelector(s);
const LS_KEY = 'voiceVocab';        // { "3": ["正花","對花",...], ... } 只存使用者的覆蓋
let SEED = [];                      // 種子(以後台 yakuList 為骨架)
let VOCAB = [];                     // [{idx,name,tai,synonyms:[]}]

// ---- 載入種子 + 疊加使用者編輯 ----
fetch('./vocab_seed.json').then(r=>r.json()).then(seed=>{
  SEED = seed;
  const over = loadOverlay();
  VOCAB = seed.map(e => ({ idx:e.idx, name:e.name, tai:e.tai,
                           synonyms: over[e.idx] ? over[e.idx].slice() : e.synonyms.slice() }));
  rebuild(); render();
}).catch(()=>{ $('#list').innerHTML = '<div class="card">讀不到 vocab_seed.json — 請用伺服器開啟。</div>'; });

function loadOverlay(){ try { return JSON.parse(localStorage.getItem(LS_KEY)||'{}'); } catch(e){ return {}; } }
function saveOverlay(){
  // 只存與種子不同的牌型,保持精簡
  const seedMap = {}; SEED.forEach(e=>seedMap[e.idx]=e.synonyms.join(''));
  const over = {};
  VOCAB.forEach(e=>{ if (e.synonyms.join('') !== seedMap[e.idx]) over[e.idx]=e.synonyms; });
  localStorage.setItem(LS_KEY, JSON.stringify(over));
  const n = Object.keys(over).length;
  $('#savedNote').textContent = n ? `已存 · ${n} 個牌型有自訂` : '已存 · 全部為預設';
}

// ---- 用目前詞庫重建音近索引(name+synonyms 當比對面) ----
function rebuild(){
  if (!window.MahjongPhonetic) return;
  const fans = VOCAB.map(e => ({ id:String(e.idx), name:e.name, aliases:e.synonyms.filter(s=>s!==e.name) }));
  MahjongPhonetic.buildIndex({ fans });
}

// ---- 渲染清單 ----
function render(){
  const kw = ($('#filter').value||'').trim();
  const list = $('#list'); list.innerHTML = '';
  VOCAB.forEach((e, i) => {
    if (kw && !(e.name.includes(kw) || e.synonyms.some(s=>s.includes(kw)))) return;
    const card = document.createElement('div'); card.className='card';
    const syn = e.synonyms.map((s) =>
      `<span class="chip${s===e.name?' name':''}">${esc(s)}${s===e.name?'':`<button class="x" data-i="${i}" data-s="${esc(s)}" title="刪除">×</button>`}</span>`
    ).join('');
    card.innerHTML =
      `<h3>${esc(e.name)} <span class="idx">idx ${e.idx}</span> <span class="tai">${e.tai}台</span>
         <span class="count">${e.synonyms.length} 詞</span></h3>
       <div class="chips">${syn}
         <input class="addin" data-i="${i}" placeholder="+ 加同義詞 ⏎">
       </div>
       ${e.synonyms.length<=1?'<div class="empty-syn">尚無同義詞,語音較難聽到</div>':''}`;
    list.appendChild(card);
  });
  // 刪除
  list.querySelectorAll('.x').forEach(b=> b.onclick = ()=>{
    const e = VOCAB[+b.dataset.i];
    e.synonyms = e.synonyms.filter(s=>s!==b.dataset.s);
    commit();
  });
  // 新增
  list.querySelectorAll('.addin').forEach(inp=> inp.addEventListener('keydown', ev=>{
    if (ev.key!=='Enter') return;
    const e = VOCAB[+inp.dataset.i]; const v = inp.value.trim();
    if (v && !e.synonyms.includes(v)) { e.synonyms.push(v); commit(); }
  }));
}
function commit(){ saveOverlay(); rebuild(); render(); }

// ---- 測試比對 ----
function runTest(text){
  const out = $('#testout');
  if (!text) { out.innerHTML='　'; return; }
  const r = MahjongPhonetic.normalize(text);
  if (!r.matched.length) { out.innerHTML = `聽到「${esc(text)}」→ <span style="color:var(--red)">對不到任何牌型</span>`; return; }
  const names = r.matched.map(m=>`<b>${esc(m.name)}</b>(idx ${m.id}${m.score<1?` · 音近${Math.round(m.score*100)}%`:''})`).join('、');
  out.innerHTML = `聽到「${esc(text)}」→ ${names}` + (r.leftover?` <span style="color:var(--dim)">· 殘音 ${esc(r.leftover)}</span>`:'');
}
$('#testIn').addEventListener('input', e=> runTest(e.target.value.trim()));

// ---- 匯出 / 匯入 / 還原 ----
$('#exportBtn').onclick = ()=>{
  const data = VOCAB.map(e=>({idx:e.idx,name:e.name,synonyms:e.synonyms}));
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='voice_vocab.json'; a.click();
};
$('#importFile').onchange = ev=>{
  const f=ev.target.files[0]; if(!f) return;
  const rd=new FileReader(); rd.onload=()=>{ try{
    const arr=JSON.parse(rd.result);
    const byIdx={}; arr.forEach(e=>byIdx[e.idx]=e.synonyms);
    VOCAB.forEach(e=>{ if(byIdx[e.idx]) e.synonyms=byIdx[e.idx].slice(); });
    commit(); alert('已匯入');
  }catch(err){ alert('匯入失敗:'+err.message); } };
  rd.readAsText(f);
};
$('#resetBtn').onclick = ()=>{ if(confirm('還原成預設(清掉你所有自訂同義詞)?')){ localStorage.removeItem(LS_KEY);
  VOCAB = SEED.map(e=>({idx:e.idx,name:e.name,tai:e.tai,synonyms:e.synonyms.slice()})); commit(); } };
$('#filter').addEventListener('input', render);

function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// ---- 語音測試(push-to-talk) ----
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR) {
  const rec = new SR(); rec.lang='zh-TW'; rec.interimResults=true; rec.continuous=false;
  let recording=false, finalText='';
  const mic=$('#mic');
  const start=()=>{ if(recording)return; finalText=''; try{rec.start();}catch(e){} };
  const stop =()=>{ if(recording) rec.stop(); };
  mic.addEventListener('mousedown',start); mic.addEventListener('mouseup',stop); mic.addEventListener('mouseleave',stop);
  mic.addEventListener('touchstart',e=>{e.preventDefault();start();}); mic.addEventListener('touchend',e=>{e.preventDefault();stop();});
  rec.onstart=()=>{ recording=true; mic.classList.add('rec'); mic.textContent='🔴'; };
  rec.onresult=e=>{ let it=''; for(let i=e.resultIndex;i<e.results.length;i++){ const t=e.results[i][0].transcript; if(e.results[i].isFinal)finalText+=t; else it+=t; } $('#testIn').value=finalText+it; runTest((finalText+it).trim()); };
  rec.onend=()=>{ recording=false; mic.classList.remove('rec'); mic.textContent='🎤'; };
} else { $('#mic').disabled=true; $('#mic').title='此瀏覽器不支援語音,改用打字測試'; }
</script>
</body>
</html>
