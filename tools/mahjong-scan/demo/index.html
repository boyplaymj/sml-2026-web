<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<title>兩雀 · 聽什麼</title>
<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel2:#273449; --line:#334155;
    --ink:#f1f5f9; --sub:#94a3b8; --accent:#38bdf8; --good:#4ade80; --warn:#fbbf24; --bad:#f87171;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation}
  html,body{margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,"PingFang TC","Noto Sans TC","Segoe UI",system-ui,sans-serif}
  body{max-width:560px; margin:0 auto; padding:12px 12px 34px}
  header{display:flex; align-items:baseline; gap:8px; margin:2px 2px 11px}
  header h1{font-size:19px; margin:0; letter-spacing:.5px}
  header .tag{font-size:11px; color:var(--sub); border:1px solid var(--line); padding:1px 7px; border-radius:99px}
  header .sub{margin-left:auto; font-size:11px; color:var(--sub)}

  /* 掃描鈕 */
  .scanrow{display:flex; gap:9px; margin-bottom:11px}
  .scan{flex:1; border:none; border-radius:14px; padding:14px; font-size:16px; font-weight:800;
    letter-spacing:.5px; color:#04222e; background:linear-gradient(180deg,#5fd0ff,#38bdf8);
    box-shadow:0 3px 10px rgba(56,189,248,.35)}
  .scan.alt{flex:0 0 34%; background:var(--panel2); color:var(--ink); box-shadow:none; border:1px solid var(--line)}
  .scan:active{transform:translateY(1px)}
  .scan:disabled{opacity:.55; background:var(--panel2); color:var(--sub); box-shadow:none}

  /* 即時掃描全螢幕層 */
  .live{position:fixed; inset:0; z-index:100; background:#000; display:none}
  .live.on{display:block}
  .live video{position:absolute; inset:0; width:100%; height:100%; object-fit:cover}
  .live .frame{position:absolute; left:5%; right:5%; top:34%; height:24%;
    border:2.5px solid #38bdf8; border-radius:12px; box-shadow:0 0 0 9999px rgba(0,0,0,.5);
    transition:border-color .2s}
  .live .frame.locked{border-color:var(--good)}
  .live .lstatus{position:absolute; left:0; right:0; top:13%; text-align:center; color:#fff;
    font-size:14px; font-weight:600; text-shadow:0 1px 3px #000; padding:0 20px}
  .live .lclose{position:absolute; top:14px; right:14px; background:rgba(0,0,0,.5); color:#fff;
    border:1px solid rgba(255,255,255,.35); border-radius:99px; padding:7px 14px; font-size:13px; font-weight:700}
  .live .lresult{position:absolute; left:0; right:0; bottom:0; background:rgba(15,23,42,.94);
    border-top:1px solid var(--line); padding:14px 14px calc(18px + env(safe-area-inset-bottom)); min-height:96px}
  .live .lhead{font-size:16px; font-weight:800; color:var(--ink); margin-bottom:9px}
  .live .lhead.good{color:var(--good)} .live .lhead.bad{color:var(--bad)}
  .live .lwaits{display:flex; gap:6px; overflow-x:auto}
  .live .lwaits .wt{flex:0 0 auto; width:34px}
  .live .lwaits .wt .tile{border-radius:5px; box-shadow:0 0 0 2px var(--good); filter:none}

  /* 牌圖（2:3） */
  .tile{display:block; width:100%; height:auto; aspect-ratio:311/468; border-radius:6px;
    object-fit:contain; user-select:none; -webkit-user-drag:none;
    filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}

  /* 結果卡：固定高，避免每次點牌上方變高把調色盤推走 */
  .result{background:var(--panel); border:1px solid var(--line); border-radius:16px;
    padding:13px 14px; margin-bottom:11px; height:150px; overflow:hidden;
    display:flex; flex-direction:column}
  .result .status{font-size:12.5px; color:var(--sub); display:flex; align-items:center; gap:8px; margin-bottom:7px}
  .result .status b{color:var(--ink); font-weight:600}
  .result .status .pill{margin-left:auto; font-size:11px; padding:2px 9px; border-radius:99px; border:1px solid var(--line)}
  .result .headline{font-size:16px; font-weight:700; line-height:1.35; letter-spacing:.3px}
  .result .headline.good{color:var(--good)} .result .headline.warn{color:var(--warn)} .result .headline.bad{color:var(--bad)}
  .result .waits{display:flex; gap:6px; margin-top:9px; overflow-x:auto; padding-bottom:2px}
  .result .waits .wt{flex:0 0 auto; width:31px}
  .result .waits .wt .tile{border-radius:5px; box-shadow:0 0 0 2px var(--good); filter:none}

  /* 手牌區：固定 2 排高、內部捲動 → 調色盤永遠不位移 */
  .handbar{display:flex; align-items:center; gap:8px; margin:0 2px 6px}
  .handbar .lbl{font-size:12.5px; color:var(--sub)}
  .handbar .btns{margin-left:auto; display:flex; gap:7px}
  .handbar button{background:var(--panel2); color:var(--sub); border:1px solid var(--line);
    border-radius:9px; padding:5px 11px; font-size:12.5px; font-weight:600}
  .handbar button:active{transform:scale(.95)}
  .hand{background:var(--panel); border:1px dashed var(--line); border-radius:14px;
    height:120px; overflow-y:auto; padding:8px; display:flex; flex-wrap:wrap; gap:5px;
    align-content:flex-start; margin-bottom:15px}
  .hand .htile{flex:0 0 auto; width:33px} .hand .empty{color:var(--sub); font-size:13px; margin:auto; opacity:.7}

  /* 調色盤：固定格線，不隨手牌變動 */
  .pal-group{margin-bottom:11px}
  .pal-group .gh{font-size:11.5px; color:var(--sub); margin:0 3px 5px; letter-spacing:2px}
  .pal{display:grid; grid-template-columns:repeat(9,1fr); gap:6px}
  .pal.honors{grid-template-columns:repeat(7,1fr)}
  .cell{position:relative; cursor:pointer; transition:transform .06s}
  .cell:active{transform:translateY(1px) scale(.95)}
  .cell.full{opacity:.4}
  .cell .cnt{position:absolute; top:-6px; right:-5px; background:var(--accent); color:#04222e;
    font-size:11px; font-weight:800; min-width:17px; height:17px; border-radius:99px;
    display:flex; align-items:center; justify-content:center; padding:0 4px; box-shadow:0 1px 3px rgba(0,0,0,.4)}

  footer{margin-top:16px; font-size:11px; color:var(--sub); text-align:center; line-height:1.6}
  footer .note{opacity:.75}
</style>
</head>
<body>
<header>
  <h1>兩雀 · 聽什麼</h1>
  <span class="tag">P1 辨識</span>
  <span class="sub">台灣 16 張制</span>
</header>

<div class="scanrow">
  <button id="liveBtn" class="scan">🎥 即時掃描</button>
  <button id="scanBtn" class="scan alt">📷 拍照</button>
</div>
<input id="fileIn" type="file" accept="image/*" capture="environment" hidden>

<!-- 即時掃描全螢幕層 -->
<div class="live" id="live">
  <video id="cam" playsinline muted></video>
  <div class="frame" id="frame"></div>
  <div class="lstatus" id="lstatus">開啟相機中…</div>
  <button class="lclose" id="lclose">✕ 關閉</button>
  <div class="lresult" id="lresult">
    <div class="lhead" id="lhead">把整排牌排進框內、拿穩</div>
    <div class="lwaits" id="lwaits"></div>
  </div>
</div>

<div class="result" id="result">
  <div class="status">
    <span>手牌 <b id="cnt">0</b> 張</span>
    <span id="phase"></span>
    <span class="pill" id="pill">請點牌</span>
  </div>
  <div class="headline" id="headline">點你的整手牌 · 有吃碰槓只點暗牌即可</div>
  <div class="waits" id="waits"></div>
</div>

<div class="handbar">
  <span class="lbl">你的手牌（點牌可移除）</span>
  <div class="btns">
    <button id="backBtn">⌫ 退一張</button>
    <button id="egBtn">範例</button>
    <button id="clrBtn">清空</button>
  </div>
</div>
<div class="hand" id="hand"><span class="empty">尚未選牌</span></div>

<div id="palette"></div>

<footer>
  台灣 16 張制 · <b>3k+1 張</b>（16/13/10/7…）判聽、<b>3k+2 張</b>判胡 · 免役即胡<br>
  <span class="note">吃碰槓露出後只點暗牌（暗牌 13/10/7 張也能判聽）· 花牌/暗槓 P0 未支援 · 判定核心 MahjongHand.js（6000 手驗證）</span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.2/dist/ort.min.js"></script>
<script src="mahjongHand.js"></script>
<script src="detect.js"></script>
<script>
(function(){
  var MAX=17;             // 門清最多 16 張，摸進第 17 張可判胡；副露暗牌更少
  var LABEL={101:'東',201:'南',301:'西',401:'北',501:'中',601:'發',701:'白'};
  function label(id){
    if(id>=1&&id<=9)   return id+'萬';
    if(id>=11&&id<=19) return (id-10)+'索';
    if(id>=21&&id<=29) return (id-20)+'筒';
    return LABEL[id];
  }
  function tileImg(id, cls){
    var img=document.createElement('img');
    img.className='tile'+(cls?(' '+cls):'');
    img.src='tiles/'+id+'.png'; img.alt=label(id); img.draggable=false;
    return img;
  }

  var hand=[]; // 牌 id 陣列
  var elHand=document.getElementById('hand'), elCnt=document.getElementById('cnt'),
      elPhase=document.getElementById('phase'), elPill=document.getElementById('pill'),
      elHead=document.getElementById('headline'), elWaits=document.getElementById('waits'),
      palette=document.getElementById('palette');

  function countOf(id){ return hand.filter(function(x){return x===id;}).length; }
  function setPill(txt,color){ elPill.textContent=txt;
    elPill.style.color=color||''; elPill.style.borderColor=color||''; }

  function add(id){
    if(hand.length>=MAX){ flash('已達 '+MAX+' 張上限'); return; }
    if(countOf(id)>=4){ flash('一種牌最多 4 張'); return; }
    hand.push(id); render();
  }
  function removeAt(i){ hand.splice(i,1); render(); }
  function flash(msg){ setPill(msg,'var(--warn)'); setTimeout(render,900); }

  function buildPalette(){
    [{h:'萬 子',ids:[1,2,3,4,5,6,7,8,9]},
     {h:'索 子',ids:[11,12,13,14,15,16,17,18,19]},
     {h:'筒 子',ids:[21,22,23,24,25,26,27,28,29]},
     {h:'字 牌',ids:[101,201,301,401,501,601,701],honors:true}
    ].forEach(function(g){
      var wrap=document.createElement('div'); wrap.className='pal-group';
      wrap.innerHTML='<div class="gh">'+g.h+'</div>';
      var grid=document.createElement('div'); grid.className='pal'+(g.honors?' honors':'');
      g.ids.forEach(function(id){
        var cell=document.createElement('div'); cell.className='cell'; cell.dataset.id=id;
        cell.appendChild(tileImg(id));
        cell.addEventListener('click', function(){ add(id); });
        grid.appendChild(cell);
      });
      wrap.appendChild(grid); palette.appendChild(wrap);
    });
  }
  function updatePaletteCounts(){
    palette.querySelectorAll('.cell').forEach(function(cell){
      var id=+cell.dataset.id, c=countOf(id), badge=cell.querySelector('.cnt');
      if(c>0){ if(!badge){badge=document.createElement('span');badge.className='cnt';cell.appendChild(badge);} badge.textContent=c; }
      else if(badge){ badge.remove(); }
      cell.classList.toggle('full', c>=4);
    });
  }

  function renderHand(){
    elHand.innerHTML='';
    if(hand.length===0){ elHand.innerHTML='<span class="empty">尚未選牌</span>'; return; }
    hand.map(function(id,i){return {id:id,i:i};})
        .sort(function(a,b){return a.id-b.id;})
        .forEach(function(o){
          var img=tileImg(o.id,'htile');
          img.addEventListener('click', function(){ removeAt(o.i); });
          elHand.appendChild(img);
        });
  }

  function renderResult(){
    var n=hand.length; elCnt.textContent=n; elWaits.innerHTML=''; setPill('');
    if(n===0){ elPhase.textContent=''; setPill('請點牌');
      elHead.className='headline'; elHead.textContent='點你的整手牌 · 有吃碰槓只點暗牌即可'; return; }

    var mod=n%3;
    if(mod===1){                                    // 3k+1 → 判聽（含副露短手 13/10/7/4…）
      elPhase.textContent='判聽（'+n+' 張等一張）';
      var waits=MahjongHand.waitingTiles(hand);
      if(waits.length>0){
        setPill('聽 '+waits.length+' 種','var(--good)');
        elHead.className='headline good'; elHead.textContent='聽牌！等下面這些：';
        waits.forEach(function(id){
          var wt=document.createElement('div'); wt.className='wt';
          wt.appendChild(tileImg(id)); wt.title=label(id);
          elWaits.appendChild(wt);
        });
      } else {
        setPill('未聽','var(--bad)');
        elHead.className='headline bad'; elHead.textContent='尚未聽牌 · 這手還沒進聽（差不只一張）';
      }
    } else if(mod===2){                             // 3k+2 → 判胡
      elPhase.textContent='判胡（'+n+' 張完成型）';
      if(MahjongHand.isHu(hand)){
        setPill('胡','var(--good)');
        elHead.className='headline good'; elHead.textContent='胡了！完整一手（面子 ×N + 將 ×1）';
      } else {
        setPill('未胡','var(--warn)');
        elHead.className='headline warn'; elHead.textContent='還沒胡 · 湊不成「面子＋將」結構';
      }
    } else {                                        // 3k → 非判聽/判胡張數
      elPhase.textContent='';
      setPill(n+' 張','var(--sub)');
      elHead.className='headline warn';
      elHead.textContent='目前 '+n+' 張 · 判聽需 3k+1 張（'+(n+1)+' 張）· 再點 1 張';
    }
  }

  function render(){ renderHand(); updatePaletteCounts(); renderResult(); }

  document.getElementById('backBtn').addEventListener('click', function(){ if(hand.length){ hand.pop(); render(); } });
  document.getElementById('clrBtn').addEventListener('click', function(){ hand=[]; render(); });
  document.getElementById('egBtn').addEventListener('click', function(){
    // 16 張三面聽：一萬刻 + 456萬 + 78萬 + 123索 + 123筒 + 中將 → 聽 3/6/9萬
    hand=[1,1,1, 4,5,6, 7,8, 11,12,13, 21,22,23, 501,501]; render();
  });

  // 📷 掃描辨識
  var scanBtn=document.getElementById('scanBtn'), fileIn=document.getElementById('fileIn');
  function scanStatus(msg){ elPhase.textContent=''; setPill('辨識','var(--accent)');
    elHead.className='headline'; elHead.textContent=msg; }
  scanBtn.addEventListener('click', function(){ fileIn.click(); });
  fileIn.addEventListener('change', function(){
    var f=fileIn.files && fileIn.files[0]; if(!f) return;
    var img=new Image();
    img.onload=function(){
      scanBtn.disabled=true; scanStatus('載入辨識模型…');
      MahjongDetect.detectTiles(img, scanStatus).then(function(out){
        URL.revokeObjectURL(img.src);
        hand = out.ids.slice(0, MAX);           // 辨識結果灌入手牌
        scanBtn.disabled=false; render();
        if(out.ids.length===0){ elHead.className='headline warn';
          elHead.textContent='沒辨識到牌 · 換個角度、讓牌面清楚再拍一次'; }
      }).catch(function(e){
        scanBtn.disabled=false; elHead.className='headline bad';
        elHead.textContent='辨識失敗：'+(e && e.message ? e.message : e);
      });
    };
    img.onerror=function(){ elHead.className='headline bad'; elHead.textContent='圖片讀取失敗'; };
    img.src=URL.createObjectURL(f);
    fileIn.value='';
  });

  // 🎥 即時掃描
  var liveBtn=document.getElementById('liveBtn'), liveEl=document.getElementById('live'),
      cam=document.getElementById('cam'), frameEl=document.getElementById('frame'),
      lstatus=document.getElementById('lstatus'), lclose=document.getElementById('lclose'),
      lhead=document.getElementById('lhead'), lwaits=document.getElementById('lwaits');
  var liveOn=false, stream=null, grab=document.createElement('canvas'), gctx=grab.getContext('2d');
  var lastKey='', stableN=0, LIVE_STABLE=2; // 連續 3 次一致才鎖定

  async function startLive(){
    liveEl.classList.add('on'); lstatus.textContent='開啟相機中…';
    lhead.className='lhead'; lhead.textContent='把整排牌排進框內、拿穩'; lwaits.innerHTML='';
    lastKey=''; stableN=0; frameEl.classList.remove('locked');
    try{
      stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}},audio:false});
      cam.srcObject=stream; await cam.play();
      liveOn=true; lstatus.textContent='載入辨識模型…（首次約 12MB）';
      tick();
    }catch(e){
      liveOn=false; liveEl.classList.remove('on');
      elHead.className='headline bad';
      elHead.textContent='相機無法開啟（'+(e&&e.name?e.name:e)+'）· 改用 📷 拍照';
    }
  }
  function stopLive(){
    liveOn=false; liveEl.classList.remove('on');
    if(stream){ stream.getTracks().forEach(function(t){t.stop();}); stream=null; }
    cam.srcObject=null;
  }
  async function tick(){
    if(!liveOn) return;
    var vw=cam.videoWidth, vh=cam.videoHeight;
    if(vw&&vh){
      var sy=Math.round(vh*0.28), sh=Math.round(vh*0.40);   // 中央橫帶(對齊框)
      grab.width=vw; grab.height=sh;
      gctx.drawImage(cam, 0,sy,vw,sh, 0,0,vw,sh);
      try{ var out=await MahjongDetect.detectTiles(grab, function(m){ lstatus.textContent=m; });
           if(liveOn) handleLive(out.ids); }
      catch(e){ /* 忽略單幀錯誤，續跑 */ }
    }
    if(liveOn) setTimeout(tick, 300);
  }
  function handleLive(ids){
    lstatus.textContent='偵測到 '+ids.length+' 張 · 拿穩對齊框內';
    var key=ids.slice().sort(function(a,b){return a-b;}).join(',');
    if(key===lastKey) stableN++; else { stableN=0; lastKey=key; frameEl.classList.remove('locked'); }
    if(stableN<LIVE_STABLE || ids.length===0) return;      // 尚未穩定
    frameEl.classList.add('locked');
    hand=ids.slice(0,MAX); render();                        // 同步進主手牌
    lwaits.innerHTML='';
    if(ids.length%3===1){
      var w=MahjongHand.waitingTiles(hand);
      if(w.length){ lhead.className='lhead good'; lhead.textContent='聽牌！聽 '+w.length+' 種：';
        w.forEach(function(id){ var e=document.createElement('div'); e.className='wt'; e.appendChild(tileImg(id)); lwaits.appendChild(e); }); }
      else { lhead.className='lhead bad'; lhead.textContent='尚未聽牌（'+ids.length+' 張）'; }
    } else if(ids.length%3===2){
      lhead.className=MahjongHand.isHu(hand)?'lhead good':'lhead';
      lhead.textContent=MahjongHand.isHu(hand)?'胡了！':'還沒胡（'+ids.length+' 張）';
    } else {
      lhead.className='lhead'; lhead.textContent='偵測到 '+ids.length+' 張 · 判聽需 3k+1 張';
    }
  }
  liveBtn.addEventListener('click', startLive);
  lclose.addEventListener('click', stopLive);

  buildPalette(); render();
})();
</script>
</body>
</html>
